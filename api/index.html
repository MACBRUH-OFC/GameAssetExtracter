<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assets Extractor</title>
    <!-- SEO & Social Preview -->
    <meta property="og:title" content="Assets Extractor">
    <meta property="og:description" content="Made by MACBRUH_FF • Professional AssetBundle, KTX, and ASTC Extractor for mobile gaming assets.">
    <meta property="og:image" content="https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        @font-face {
            font-family: 'GFF-Bold';
            src: url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff');
        }
        
        :root {
            --ff-yellow: #ffde00;
            --ff-cyan: #38bdf8;
            --panel-bg: rgba(10, 10, 10, 0.95);
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            background-image: url('https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/bg_pc.617c669.jpg');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.94);
            z-index: -1;
        }

        .gff { font-family: 'GFF-Bold', sans-serif; }

        /* HEADER & LINE */
        header {
            width: 100%;
            border-bottom: 2px solid var(--ff-yellow);
            padding: 25px 0;
            display: flex;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            margin-bottom: 40px;
        }

        /* MAIN CONTAINER STYLE */
        .uniform-panel {
            background: var(--panel-bg);
            border: 1px solid #1f1f1f;
            /* Square left, rounded right as requested */
            border-radius: 0 24px 24px 0;
            position: relative;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            height: 440px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .uniform-panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--ff-yellow);
        }

        .panel-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* BOX UI COMPONENTS */
        .scrollable-box {
            flex: 1;
            background: #060608;
            border: 1px solid #1a1a1f;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .btn-mechanical {
            cursor: pointer;
            font-family: 'GFF-Bold';
            text-transform: uppercase;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: var(--ff-yellow);
            color: #000;
            box-shadow: 0 4px 0 #c2a900;
            transition: transform 0.1s;
        }

        .btn-mechanical:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #c2a900;
        }

        .upload-deck {
            background: #121212;
            border: 2px dashed #2a2a2a;
            border-radius: 16px;
            height: 90px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            overflow: hidden;
        }

        .upload-deck:hover {
            border-color: var(--ff-yellow);
            background: #161612;
        }

        /* CUSTOM DROPDOWNS */
        .custom-dropdown {
            position: relative;
            width: 140px;
        }

        .dropdown-trigger {
            background: #121216;
            border: 1px solid #272732;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            color: #d4d4d8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            white-space: nowrap;
        }

        .dropdown-menu {
            position: absolute;
            top: 110%;
            right: 0;
            width: 200px;
            background: #0f0f12;
            border: 1px solid #272732;
            border-radius: 10px;
            z-index: 100;
            display: none;
            max-height: 280px;
            overflow-y: auto;
            box-shadow: 0 15px 45px rgba(0,0,0,0.9);
        }

        .dropdown-item {
            padding: 10px 14px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #1a1a20;
            color: #a1a1aa;
            transition: 0.2s;
        }

        .dropdown-item:hover { background: #1a1a22; color: #fff; }
        .dropdown-item.active { color: var(--ff-yellow); font-weight: bold; }

        /* ANIMATIONS & EFFECTS */
        .wave-bar {
            width: 3px;
            background: #1f1f2e;
            border-radius: 2px;
            height: 4px;
            transition: height 0.1s ease, background 0.2s;
        }

        .playing .wave-bar {
            background: var(--ff-cyan);
            animation: audioPulse 0.5s infinite alternate;
        }

        @keyframes audioPulse {
            from { height: 4px; }
            to { height: 32px; }
        }

        .loading-spin {
            animation: rotateFix 1s linear infinite;
            display: inline-block;
        }

        @keyframes rotateFix {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #222227; border-radius: 10px; }

        @media (max-width: 1023px) {
            .uniform-panel { border-radius: 0 16px 16px 0; height: auto; min-height: 240px; }
            .adaptive-list { max-height: 440px; }
        }
    </style>
</head>
<body class="p-4 md:p-0">
    <header>
        <img src="https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png" class="h-10" alt="Logo">
    </header>

    <div class="max-w-7xl mx-auto px-6 mb-20">
        <!-- Dashboard Title -->
        <div class="text-center mb-12 gff">
            <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter leading-[0.85]">ASSETS<br><span class="text-[#ffde00]">EXTRACTOR</span></h1>
            <div class="flex items-center justify-center gap-4 mt-6 text-zinc-500 font-bold text-[10px] md:text-xs uppercase tracking-[0.25em]">
                <i class="fa-solid fa-cube text-[#ffde00] text-sm"></i>
                <span>AssetBundle • KTX • ASTC • Assets Extractor</span>
                <i class="fa-solid fa-cube text-[#ffde00] text-sm"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 1. UPLOAD CONTROL -->
            <div class="uniform-panel">
                <div class="panel-body">
                    <h2 class="text-xs font-black uppercase tracking-[0.2em] mb-4 gff text-zinc-500">I/O INTERFACE</h2>
                    <form id="extractionForm" class="space-y-4 flex-1">
                        <div class="upload-deck" onclick="document.getElementById('fileInput').click()">
                            <div class="w-20 h-full flex items-center justify-center border-r border-zinc-800 bg-black/20">
                                <i id="upIcon" class="fa-solid fa-folder-open text-zinc-700 text-3xl"></i>
                            </div>
                            <div class="px-5 overflow-hidden">
                                <span class="block text-[10px] font-bold text-zinc-600 uppercase gff mb-1">Source Stream</span>
                                <p id="fileLabel" class="text-xs text-zinc-400 truncate font-semibold">Select Map Data</p>
                            </div>
                        </div>
                        <input type="file" id="fileInput" class="hidden" multiple>
                        <button type="submit" class="btn-mechanical w-full h-16 text-sm gap-3">
                            <i class="fa-solid fa-bolt-lightning"></i> Initialize Pipeline
                        </button>
                    </form>
                    <div class="mt-4 p-4 bg-zinc-900/40 border border-zinc-800 rounded-2xl flex items-center gap-4">
                        <div id="statusIcon" class="text-zinc-600 w-5 text-center"><i class="fa-solid fa-terminal"></i></div>
                        <div class="flex-1 min-w-0">
                            <span class="block text-[8px] font-bold text-zinc-500 uppercase tracking-widest">System Kernel</span>
                            <p id="statusMsg" class="text-[10px] text-zinc-400 truncate">Core standby...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. ASSET INVENTORY -->
            <div class="uniform-panel adaptive-list">
                <div class="panel-body">
                    <div class="flex items-center justify-between mb-5">
                        <div class="gff">
                            <h2 class="text-xs font-black uppercase tracking-[0.2em] text-zinc-500">Inventory</h2>
                            <p id="counterVal" class="text-[10px] text-zinc-600">0 elements available</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="custom-dropdown hidden" id="filterContainer">
                                <div class="dropdown-trigger" onclick="toggleMenu('filterMenu')">
                                    <span id="filterText">All Types</span>
                                    <i class="fa-solid fa-chevron-down"></i>
                                </div>
                                <div class="dropdown-menu custom-scrollbar" id="filterMenu"></div>
                            </div>
                            <!-- ZIP DOWNLOAD ICON -->
                            <div class="custom-dropdown hidden" id="zipContainer">
                                <div class="dropdown-trigger" onclick="toggleMenu('zipMenu')" style="background:var(--ff-yellow); color:#000; border:none; width:40px; justify-content:center;">
                                    <i class="fa-solid fa-file-zipper text-sm"></i>
                                </div>
                                <div class="dropdown-menu" id="zipMenu">
                                    <div class="dropdown-item" onclick="initZipDownload('zip')">
                                        <i class="fa-solid fa-box-archive"></i> Download All
                                    </div>
                                    <div class="dropdown-item hidden" id="zipFilterBtn" onclick="initZipDownload('zip_filtered')">
                                        <i class="fa-solid fa-filter"></i> Download Selected
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="scrollable-box">
                        <div id="listLoading" class="absolute inset-0 bg-black/95 z-50 hidden flex-col items-center justify-center">
                            <i class="fa-solid fa-circle-notch loading-spin text-yellow-500 text-4xl"></i>
                            <span class="text-[10px] font-bold text-zinc-600 mt-5 uppercase tracking-[0.4em]">Decompressing Clusters</span>
                        </div>
                        <div id="assetItems" class="h-full overflow-y-auto custom-scrollbar p-3 space-y-1.5"></div>
                    </div>
                </div>
            </div>

            <!-- 3. VISUALIZATION PREVIEW -->
            <div class="uniform-panel">
                <div class="panel-body">
                    <h2 class="text-xs font-black uppercase tracking-[0.2em] text-zinc-500 mb-4 gff">Visualization</h2>
                    <div class="scrollable-box bg-black/60">
                        <div id="prevLoading" class="absolute inset-0 bg-black/70 z-30 hidden items-center justify-center">
                            <i class="fa-solid fa-spinner loading-spin text-yellow-500 text-3xl"></i>
                        </div>
                        <div id="prevEmpty" class="h-full flex flex-col items-center justify-center text-zinc-800">
                            <i class="fa-solid fa-eye-slash text-5xl mb-4"></i>
                            <span class="text-[10px] font-bold uppercase tracking-[0.3em]">No Selection</span>
                        </div>
                        <div id="prevMain" class="hidden h-full flex flex-col p-4">
                            <div id="mediaBox" class="flex-1 rounded-2xl overflow-hidden flex items-center justify-center relative bg-zinc-900/10 border border-zinc-800/50 shadow-inner"></div>
                            <div class="mt-4 p-3 bg-zinc-900/90 border border-zinc-800 rounded-2xl flex items-center justify-between">
                                <p id="mediaLabel" class="text-[10px] font-bold text-zinc-500 truncate pr-4"></p>
                                <a id="directDl" href="#" class="h-11 w-11 bg-zinc-800 rounded-xl flex items-center justify-center text-zinc-500 hover:text-yellow-400 hover:bg-zinc-700 transition-all shadow-md">
                                    <i class="fa-solid fa-arrow-down-long"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let assetList = [];
        let filterSet = new Set();
        let audioInst = null;

        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const upIcon = document.getElementById('upIcon');

        fileInput.onchange = () => {
            if(fileInput.files.length) {
                fileLabel.innerText = fileInput.files.length > 1 ? `${fileInput.files.length} Files Selected` : fileInput.files[0].name;
                fileLabel.classList.add('text-yellow-500');
                upIcon.className = "fa-solid fa-circle-check text-yellow-500 text-3xl";
            }
        };

        function toggleMenu(id) {
            const el = document.getElementById(id);
            const visible = el.style.display === 'block';
            document.querySelectorAll('.dropdown-menu').forEach(d => d.style.display = 'none');
            el.style.display = visible ? 'none' : 'block';
        }

        window.onclick = (e) => {
            if(!e.target.closest('.custom-dropdown')) {
                document.querySelectorAll('.dropdown-menu').forEach(d => d.style.display = 'none');
            }
        };

        document.getElementById('extractionForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!fileInput.files.length) return;

            document.getElementById('listLoading').style.display = 'flex';
            document.getElementById('statusMsg').innerText = "Processing Data Clusters...";

            const fd = new FormData();
            for(let f of fileInput.files) fd.append('asset_bundle', f);

            try {
                const res = await fetch('/api/extract', { method: 'POST', body: fd });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                assetList = data.files;
                filterSet.clear();
                drawAssetList();
                buildFilterItems();

                document.getElementById('filterContainer').classList.remove('hidden');
                document.getElementById('zipContainer').classList.remove('hidden');
                document.getElementById('statusMsg').innerText = `Sync successful: ${assetList.length} assets mapped.`;
                document.getElementById('statusIcon').innerHTML = `<i class="fa-solid fa-check text-emerald-500"></i>`;
            } catch(err) {
                document.getElementById('statusMsg').innerText = err.message;
                document.getElementById('statusIcon').innerHTML = `<i class="fa-solid fa-xmark text-red-500"></i>`;
            }
            document.getElementById('listLoading').style.display = 'none';
        };

        function buildFilterItems() {
            const menu = document.getElementById('filterMenu');
            const types = [...new Set(assetList.map(a => a.label))].sort();
            menu.innerHTML = '';

            types.forEach(type => {
                const row = document.createElement('div');
                row.className = `dropdown-item ${filterSet.has(type) ? 'active' : ''}`;
                row.innerHTML = `<i class="fa-solid ${filterSet.has(type) ? 'fa-square-check' : 'fa-square'}"></i> ${type}`;
                row.onclick = (e) => {
                    e.stopPropagation();
                    filterSet.has(type) ? filterSet.delete(type) : filterSet.add(type);
                    drawAssetList();
                    buildFilterItems();
                };
                menu.appendChild(row);
            });

            document.getElementById('filterText').innerText = filterSet.size > 0 ? `${filterSet.size} Active` : 'All Types';
            document.getElementById('zipFilterBtn').classList.toggle('hidden', filterSet.size === 0);
        }

        function drawAssetList() {
            const container = document.getElementById('assetItems');
            container.innerHTML = '';
            const filtered = assetList.filter(a => filterSet.size === 0 || filterSet.has(a.label));
            document.getElementById('counterVal').innerText = `${filtered.length} elements available`;

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-3 bg-zinc-900/30 border border-zinc-800/80 rounded-xl cursor-pointer hover:border-zinc-500 transition-all group";
                div.onclick = () => showMediaPreview(item);
                div.innerHTML = `
                    <div class="flex items-center gap-4 truncate">
                        <div class="w-8 h-8 bg-black rounded-lg border border-zinc-800 flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid ${getAssetIco(item.label)} text-[10px]"></i>
                        </div>
                        <div class="truncate">
                            <p class="text-[11px] font-bold text-zinc-300 truncate group-hover:text-white">${item.name}</p>
                            <p class="text-[8px] font-bold text-zinc-600 uppercase tracking-widest mt-0.5">${item.label}</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-[9px] text-zinc-800 group-hover:text-zinc-500 transition-colors"></i>
                `;
                container.appendChild(div);
            });
        }

        function getAssetIco(l) {
            const t = l.toLowerCase();
            if(t.includes('texture') || t.includes('sprite')) return 'fa-image text-yellow-500';
            if(t.includes('audio')) return 'fa-waveform-lines text-cyan-400';
            if(t.includes('mesh')) return 'fa-shapes text-purple-400';
            if(t.includes('video')) return 'fa-clapperboard text-red-500';
            if(t.includes('font')) return 'fa-font text-emerald-400';
            return 'fa-file-code text-zinc-600';
        }

        async function showMediaPreview(item) {
            document.getElementById('prevEmpty').style.display = 'none';
            document.getElementById('prevMain').classList.remove('hidden');
            document.getElementById('prevLoading').style.display = 'flex';
            
            if(audioInst) { audioInst.pause(); audioInst = null; }
            
            const box = document.getElementById('mediaBox');
            const url = `/api/extract?download_type=single&file_index=${item.index}`;
            
            box.innerHTML = '';
            document.getElementById('mediaLabel').innerText = item.name;
            document.getElementById('directDl').href = url;

            const ext = item.name.split('.').pop().toLowerCase();
            
            try {
                if(['png','jpg','webp'].includes(ext)) {
                    box.innerHTML = `<img src="${url}" class="max-h-full max-w-full object-contain pointer-events-none">`;
                } else if(['mp3','wav','ogg'].includes(ext)) {
                    box.innerHTML = `
                        <div class="flex flex-col items-center gap-6 w-full">
                            <div class="flex gap-1.5 h-10 items-center" id="audioWaves">
                                ${Array(20).fill('<div class="wave-bar"></div>').join('')}
                            </div>
                            <button onclick="handlePlayback('${url}', this)" class="w-14 h-14 rounded-full bg-cyan-400 text-black flex items-center justify-center shadow-2xl active:scale-90 transition-all"><i class="fa-solid fa-play text-xl ml-1"></i></button>
                        </div>`;
                } else {
                    const r = await fetch(url);
                    const t = await r.text();
                    box.innerHTML = `<pre class="text-[10px] text-zinc-500 p-5 w-full h-full overflow-auto text-left whitespace-pre-wrap select-text">${t.slice(0, 5000)}</pre>`;
                }
            } catch(e) {
                box.innerHTML = '<span class="text-xs text-zinc-600">Visualization Failed</span>';
            }
            
            document.getElementById('prevLoading').style.display = 'none';
        }

        function handlePlayback(url, btn) {
            if(audioInst) {
                audioInst.pause();
                btn.innerHTML = '<i class="fa-solid fa-play text-xl ml-1"></i>';
                document.getElementById('audioWaves').classList.remove('playing');
                if(audioInst.src.includes(url)) { audioInst = null; return; }
            }
            
            audioInst = new Audio(url);
            audioInst.play();
            btn.innerHTML = '<i class="fa-solid fa-pause text-xl"></i>';
            document.getElementById('audioWaves').classList.add('playing');
            audioInst.onended = () => {
                btn.innerHTML = '<i class="fa-solid fa-play text-xl ml-1"></i>';
                document.getElementById('audioWaves').classList.remove('playing');
            };
        }

        function initZipDownload(type) {
            const targets = assetList.filter(a => filterSet.size === 0 || filterSet.has(a.label));
            const ids = targets.map(a => a.index).join(',');
            window.location.href = `/api/extract?download_type=${type}&indices=${ids}`;
        }
    </script>
</body>
</html>
