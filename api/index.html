<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assets Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #060606;
            color: #f4f4f5;
            background-image: url('https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/bg_pc.617c669.jpg');
            background-size: cover;
            background-attachment: fixed;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(6, 6, 6, 0.94);
            z-index: -1;
        }
        .premium-panel {
            background: #0f0f12;
            border: 1px solid #1f1f24;
            border-top: 3px solid #ffde00;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }
        .btn-elite {
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            background: #ffde00;
            color: #000;
            box-shadow: 0 4px 0 #b39c00;
            transition: all 0.1s ease;
        }
        .btn-elite:hover {
            background: #ffe633;
        }
        .btn-elite:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b39c00;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0a0a0c;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #222229;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #ffde00;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full bg-[#0a0a0c]/80 backdrop-blur border-b-2 border-[#ffde00] py-4 px-6 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-wider text-white italic">ASSETS EXTRACTOR</h1>
            <div class="flex items-center gap-2 text-[11px] font-bold text-[#ffde00] bg-[#141419] px-3 py-1.5 rounded border border-[#222229] uppercase tracking-widest">
                <span class="w-2 h-2 rounded-full bg-[#ffde00] animate-pulse"></span> Ready
            </div>
        </div>
    </header>

    <main class="flex-1 w-full max-w-6xl mx-auto p-4 md:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-stretch">
            
            <div class="lg:col-span-5 flex flex-col">
                <div class="premium-panel rounded-xl p-6 flex flex-col justify-between h-full space-y-6">
                    <div>
                        <h2 class="text-sm font-black text-white uppercase tracking-wider mb-1">Upload Source</h2>
                        <p class="text-xs text-zinc-500">Drop a game file or image to extract and convert.</p>
                    </div>

                    <form id="extractorForm" class="space-y-5">
                        <div class="border border-[#222229] rounded-xl p-6 text-center cursor-pointer transition-all bg-[#0a0a0c] hover:border-[#ffde00]/50" onclick="document.getElementById('fileInput').click()">
                            <div class="w-12 h-12 bg-[#131317] rounded-xl flex items-center justify-center mx-auto mb-3 border border-[#222229]" id="uploadIconWrapper">
                                <svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-8l-4-4m0 0l-4 4m4-4v12"/></svg>
                            </div>
                            <p id="fileLabel" class="text-xs font-bold text-zinc-300 uppercase tracking-wide truncate px-2">Select Target File</p>
                            <p id="fileSubLabel" class="text-[10px] text-zinc-600 uppercase tracking-widest mt-1">Bundle, KTX, or PNG</p>
                        </div>
                        <input type="file" id="fileInput" class="hidden" required>

                        <div class="space-y-1.5">
                            <label class="block text-[11px] font-bold text-zinc-500 uppercase tracking-wider">Operation Mode</label>
                            <div class="relative">
                                <select id="actionSelect" class="w-full h-12 bg-[#0a0a0c] border border-[#222229] rounded-xl px-4 text-xs font-bold uppercase tracking-wider text-white focus:outline-none focus:border-[#ffde00] appearance-none cursor-pointer">
                                    <option value="extract">Extract Files (Decompress Bundle)</option>
                                    <option value="ktx_to_png">Convert KTX to PNG Image</option>
                                    <option value="png_to_ktx">Convert PNG to KTX Texture</option>
                                </select>
                                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-[#ffde00]">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="w-full h-14 btn-elite text-sm rounded-xl flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            Execute Action
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-7 flex flex-col">
                <div class="premium-panel rounded-xl p-6 flex flex-col justify-between h-full min-h-[460px] space-y-4">
                    
                    <div class="flex items-center justify-between border-b border-[#1f1f24] pb-4">
                        <div>
                            <h2 class="text-sm font-black text-white uppercase tracking-wider">Storage Index</h2>
                            <p id="statusText" class="text-xs text-zinc-500">No active extraction registry cached.</p>
                        </div>
                        <button id="downloadAllBtn" class="hidden text-xs bg-[#0a0a0c] border border-[#222229] hover:border-[#ffde00] text-[#ffde00] p-2.5 rounded-xl font-bold uppercase tracking-wider transition-colors flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        </button>
                    </div>

                    <div class="flex-1 w-full bg-[#0a0a0c] border border-[#1f1f24] rounded-xl flex items-center justify-center relative min-h-[320px]" id="displayArea">
                        
                        <div class="text-center space-y-2" id="emptyState">
                            <svg class="w-6 h-6 text-zinc-700 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 11m8 4V4.5"/></svg>
                            <p class="text-xs text-zinc-600 uppercase tracking-widest font-medium">Awaiting active data connection layout...</p>
                        </div>

                        <div class="w-full h-full hidden grid grid-cols-1 md:grid-cols-2 p-3 gap-3" id="resultsGrid">
                            
                            <div class="border border-[#1f1f24] rounded-lg overflow-y-auto custom-scrollbar bg-[#060608] p-2 space-y-1 max-h-[340px]" id="fileList">
                                </div>

                            <div class="border border-[#1f1f24] rounded-lg bg-[#060608] p-4 flex flex-col items-center justify-between relative max-h-[340px]">
                                <div id="previewFallback" class="my-auto text-center text-zinc-600 space-y-1">
                                    <svg class="w-5 h-5 mx-auto text-zinc-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                    <p class="text-[10px] font-bold uppercase tracking-wider">Select a node node link</p>
                                </div>

                                <div id="previewContentBox" class="hidden w-full h-full flex flex-col justify-between items-center space-y-3">
                                    <div class="flex-1 w-full flex items-center justify-center overflow-hidden rounded-lg bg-[#0a0a0c] border border-[#1f1f24] p-2" id="mediaBox">
                                        </div>
                                    <div class="w-full flex items-center justify-between gap-3 bg-[#0a0a0c] p-2 rounded-lg border border-[#1f1f24]">
                                        <p id="mediaTitle" class="text-xs text-zinc-400 font-bold truncate px-1 flex-1 text-left"></p>
                                        <a id="singleSaveBtn" href="#" class="h-8 w-8 bg-[#131317] hover:bg-[#ffde00] hover:text-black text-zinc-400 rounded-md border border-[#222229] transition-colors flex items-center justify-center">
                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                        </a>
                                    </div>
                                </div>
                            </div>

                        </div>

                    </div>

                </div>
            </div>

        </div>
    </main>

    <footer class="w-full text-center py-4 text-[10px] font-bold text-zinc-700 border-t border-[#141419] bg-[#0a0a0c] tracking-widest uppercase">
        Extractor Suite &bull; Dark Core System
    </footer>

<script>
    let activeCache = [];
    const fileInput = document.getElementById("fileInput");
    const fileLabel = document.getElementById("fileLabel");
    const actionSelect = document.getElementById("actionSelect");
    const emptyState = document.getElementById("emptyState");
    const resultsGrid = document.getElementById("resultsGrid");
    const fileList = document.getElementById("fileList");
    const downloadAllBtn = document.getElementById("downloadAllBtn");
    const statusText = document.getElementById("statusText");
    const uploadIconWrapper = document.getElementById("uploadIconWrapper");

    const previewFallback = document.getElementById("previewFallback");
    const previewContentBox = document.getElementById("previewContentBox");
    const mediaBox = document.getElementById("mediaBox");
    const mediaTitle = document.getElementById("mediaTitle");
    const singleSaveBtn = document.getElementById("singleSaveBtn");

    // Predefined Type SVGs
    const SVG_TEXT = `<svg class="w-3.5 h-3.5 text-zinc-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>`;
    const SVG_IMAGE = `<svg class="w-3.5 h-3.5 text-[#ffde00] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>`;
    const SVG_AUDIO = `<svg class="w-3.5 h-3.5 text-cyan-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>`;
    const SVG_VIDEO = `<svg class="w-3.5 h-3.5 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>`;

    // Extension File Watcher Engine to Auto Detect Operations Selection Targets Mode
    fileInput.addEventListener("change", function() {
        if (!this.files[0]) return;
        const name = this.files[0].name;
        const ext = name.split('.').pop().toLowerCase();
        
        fileLabel.innerText = name;
        fileLabel.style.color = "#ffde00";
        uploadIconWrapper.innerHTML = `<svg class="w-5 h-5 text-[#ffde00]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>`;

        if (ext === "ktx") {
            actionSelect.value = "ktx_to_png";
        } else if (ext === "png") {
            actionSelect.value = "png_to_ktx";
        } else {
            actionSelect.value = "extract";
        }
    });

    function selectFileNode(index) {
        const item = activeCache[index];
        if (!item) return;

        previewFallback.style.display = "none";
        previewContentBox.classList.remove("hidden");
        mediaTitle.innerText = item.name;
        mediaBox.innerHTML = "";

        const fileUrl = `/api/extract?download_type=single&file_index=${item.index}`;
        singleSaveBtn.href = fileUrl;
        singleSaveBtn.download = item.name;

        const ext = item.name.split('.').pop().toLowerCase();

        if (["png", "jpg", "jpeg", "webp"].includes(ext)) {
            mediaBox.innerHTML = `<img src="${fileUrl}" class="max-w-full max-h-[160px] object-contain rounded drop-shadow">`;
        } else if (["mp3", "wav", "ogg"].includes(ext)) {
            mediaBox.innerHTML = `<audio controls src="${fileUrl}" class="w-full px-2"></audio>`;
        } else {
            mediaBox.innerHTML = `
                <div class="text-center text-zinc-600 space-y-1">
                    <svg class="w-6 h-6 text-zinc-700 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                    <span class="text-[10px] font-bold uppercase tracking-wider block text-zinc-500">Binary Asset Node</span>
                </div>`;
        }
    }

    document.getElementById("extractorForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const file = fileInput.files[0];
        if (!file) return;

        const mode = actionSelect.value;
        emptyState.innerHTML = `
            <div class="text-center space-y-2">
                <div class="w-5 h-5 border-2 border-[#ffde00] border-t-transparent rounded-full animate-spin mx-auto"></div>
                <p class="text-[10px] uppercase tracking-widest font-bold text-zinc-500">Streaming...</p>
            </div>`;
        
        emptyState.style.display = "block";
        resultsGrid.classList.add("hidden");
        downloadAllBtn.classList.add("hidden");
        statusText.innerText = "Parsing asset targets...";

        const formData = new FormData();

        if (mode === "extract") {
            formData.append("asset_bundle", file);
            try {
                const response = await fetch("/api/extract", { method: "POST", body: formData });
                if (!response.ok) throw new Error((await response.json().catch(() => ({}))).error || "File validation missing.");

                const data = await response.json();
                activeCache = data.files || [];

                fileList.innerHTML = "";
                activeCache.forEach(item => {
                    const row = document.createElement("div");
                    row.className = "w-full p-2 text-left text-xs text-zinc-400 bg-[#0a0a0c] border border-[#1f1f24] rounded-lg flex items-center justify-between cursor-pointer hover:border-[#ffde00] transition-colors truncate";
                    row.onclick = () => selectFileNode(item.index);
                    
                    // Assign icon depending on extension flags directly inside list mapping matrix
                    const ext = item.name.split('.').pop().toLowerCase();
                    let currentSvg = SVG_TEXT;
                    if (["png", "jpg", "jpeg", "webp"].includes(ext)) currentSvg = SVG_IMAGE;
                    else if (["mp3", "wav", "ogg"].includes(ext)) currentSvg = SVG_AUDIO;
                    else if (["mp4"].includes(ext)) currentSvg = SVG_VIDEO;

                    row.innerHTML = `
                        <div class="flex items-center gap-2 truncate">
                            ${currentSvg}
                            <span class="truncate font-medium text-zinc-300">${item.name}</span>
                        </div>
                        <svg class="w-3 h-3 text-zinc-700 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>`;
                    fileList.appendChild(row);
                });

                emptyState.style.display = "none";
                resultsGrid.classList.remove("hidden");
                downloadAllBtn.classList.remove("hidden");
                downloadAllBtn.onclick = () => { window.location.href = "/api/extract?download_type=zip"; };
                statusText.innerText = `Extracted items: ${activeCache.length}`;

                previewFallback.style.display = "flex";
                previewContentBox.classList.add("hidden");

            } catch (err) {
                statusText.innerText = "Error encountered.";
                emptyState.innerHTML = `<p class="text-xs text-red-500 font-bold uppercase tracking-wide">${err.message}</p>`;
            }
        } else {
            formData.append("file", file);
            formData.append("mode", mode);
            try {
                const response = await fetch("/api/convert", { method: "POST", body: formData });
                if (!response.ok) throw new Error("Conversion failed.");

                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const outName = mode === "ktx_to_png" ? "converted.png" : "converted.ktx";

                fileList.innerHTML = `
                    <div class="w-full p-2.5 text-left text-xs bg-[#0a0a0c] border border-[#ffde00]/30 rounded-lg flex items-center justify-between cursor-pointer" onclick="activeCache[0].view()">
                        <div class="flex items-center gap-2 truncate">
                            ${mode === "ktx_to_png" ? SVG_IMAGE : SVG_TEXT}
                            <span class="truncate font-bold text-white">${outName}</span>
                        </div>
                    </div>`;

                activeCache = [{
                    index: 0,
                    name: outName,
                    view: () => {
                        previewFallback.style.display = "none";
                        previewContentBox.classList.remove("hidden");
                        mediaTitle.innerText = outName;
                        singleSaveBtn.href = blobUrl;
                        singleSaveBtn.download = outName;
                        mediaBox.innerHTML = mode === "ktx_to_png" 
                            ? `<img src="${blobUrl}" class="max-w-full max-h-[160px] object-contain rounded shadow">`
                            : `<div class="text-center text-zinc-600"><svg class="w-6 h-6 text-zinc-700 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg><span class="text-[10px] font-bold uppercase tracking-wider text-zinc-500 block">KTX Binary Package</span></div>`;
                    }
                }];

                emptyState.style.display = "none";
                resultsGrid.classList.remove("hidden");
                statusText.innerText = "File processing complete.";
                activeCache[0].view();

            } catch (err) {
                statusText.innerText = "Error encountered.";
                emptyState.innerHTML = `<p class="text-xs text-red-500 font-bold uppercase tracking-wide">Operation matrix failure.</p>`;
            }
        }
    });
</script>

</body>
</html>
