<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assets Extractor | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'GFF-Bold'; src: url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff'); }
        :root { --ff-yellow: #ffde00; --ff-emerald: #00ffa3; --ff-red: #ff3e3e; --ff-cyan: #38bdf8; }
        body { background: #000; color: #fff; min-height: 100vh; background-image: url('https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/bg_pc.617c669.jpg'); background-size: cover; background-attachment: fixed; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        body::before { content: ""; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.94); z-index: -1; }
        .gff { font-family: 'GFF-Bold', sans-serif; }
        
        .uniform-panel { 
            background: #0a0a0a; border: 1px solid #1f1f1f; 
            border-radius: 0 24px 24px 0; /* Square left, rounded right */
            position: relative; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8); 
            height: 420px; display: flex; flex-direction: column; overflow: hidden;
        }

        .panel-body { padding: 24px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .scrollable-content-box { flex: 1; background: #060608; border: 1px solid #1a1a1f; border-radius: 16px; overflow-y: auto; position: relative; min-height: 120px; }
        
        .btn-mechanical { cursor: pointer; font-family: 'GFF-Bold'; text-transform: uppercase; font-style: italic; display: flex; align-items: center; justify-content: center; border-radius: 16px; gap: 12px; background: var(--ff-yellow); color: #000; box-shadow: 0 5px 0 #c2a900; transition: all 0.1s; }
        .btn-mechanical:active { transform: translateY(2px); box-shadow: 0 2px 0 #c2a900; }

        .upload-deck { background: #121212; border: 2px dashed #2a2a2a; border-radius: 20px; display: flex; align-items: center; height: 110px; cursor: pointer; transition: all 0.2s; }
        .upload-deck.dragover { border-color: var(--ff-yellow); background: #161612; }
        
        .custom-dropdown { position: relative; width: 100%; }
        .dropdown-trigger { background: #121216; border: 1px solid #272732; padding: 10px; border-radius: 8px; font-size: 11px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .dropdown-menu { position: absolute; top: 105%; left: 0; right: 0; background: #121216; border: 1px solid #272732; border-radius: 8px; z-index: 50; max-height: 200px; overflow-y: auto; display: none; }
        .dropdown-item { padding: 8px 12px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .dropdown-item:hover { background: #1a1a22; }
        .dropdown-item.active { color: var(--ff-yellow); }

        .pixelated-render { image-rendering: pixelated; max-height: 100%; max-width: 100%; object-fit: contain; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #222227; border-radius: 10px; }

        /* Waveform Animation */
        .wave-container { display: flex; align-items: center; gap: 2px; height: 40px; justify-content: center; }
        .bar { width: 3px; height: 20%; background: var(--ff-cyan); border-radius: 2px; transition: height 0.1s; }
        .playing .bar { animation: waveAnim 0.5s infinite alternate; }
        @keyframes waveAnim { from { height: 20%; } to { height: 100%; } }

        #downloadModal { background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <div class="flex items-center justify-center gap-4 mb-2">
            <i class="fa-solid fa-cube text-[#ffde00] text-2xl"></i>
            <div class="text-center gff">
                <span class="text-[40px] md:text-[54px] font-black italic block leading-[0.75]">ASSETS</span>
                <span class="text-[40px] md:text-[54px] font-black italic block text-[#ffde00] leading-[0.85]">EXTRACTOR</span>
            </div>
            <i class="fa-solid fa-microchip text-[#ffde00] text-2xl"></i>
        </div>
        <p class="text-center text-[11px] tracking-[0.3em] text-zinc-500 uppercase font-bold mb-8">AssetBundle • KTX • Unity Assets Extractor</p>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- UPLOAD -->
            <div class="uniform-panel">
                <div class="panel-body justify-between">
                    <div>
                        <h2 class="text-xs font-black uppercase tracking-wider mb-1 gff">Source Input</h2>
                        <p class="text-[11px] text-zinc-500">Upload Unity package or KTX file.</p>
                    </div>
                    <form id="extractorForm" class="flex-1 flex flex-col justify-center space-y-4">
                        <div class="upload-deck" id="dropZone" onclick="document.getElementById('fileInput').click()">
                            <div class="px-6 border-r border-zinc-800"><i class="fa-solid fa-folder-open text-zinc-500"></i></div>
                            <div class="flex-1 px-4">
                                <span class="text-[9px] font-bold text-zinc-500 gff uppercase block">Package</span>
                                <p id="fileLabel" class="text-xs text-zinc-300 truncate">Select File</p>
                            </div>
                        </div>
                        <input type="file" id="fileInput" class="hidden">
                        <button type="submit" class="btn-mechanical h-14 text-sm font-bold italic">Extract</button>
                    </form>
                    <div class="bg-[#121212] border border-zinc-800 p-3 rounded-xl flex items-center gap-3">
                        <i id="statusIcon" class="fa-solid fa-terminal text-xs text-zinc-500"></i>
                        <div class="flex-1 min-w-0">
                            <p id="statusText" class="text-[10px] text-zinc-400 font-bold truncate">Ready</p>
                        </div>
                        <span id="statusBadge" class="text-[8px] bg-black px-2 py-0.5 rounded border border-zinc-800 text-zinc-500">IDLE</span>
                    </div>
                </div>
            </div>

            <!-- LIST -->
            <div class="uniform-panel">
                <div class="panel-body">
                    <div class="flex items-center justify-between border-b border-zinc-900 pb-3 mb-3">
                        <div>
                            <h2 class="text-xs font-black uppercase gff">Content</h2>
                            <p id="cacheCounterText" class="text-[10px] text-zinc-500">0 items</p>
                        </div>
                        <div class="flex gap-2">
                            <div id="multiFilter" class="custom-dropdown min-w-[120px]">
                                <div class="dropdown-trigger gff text-[10px]"><span>Filter</span> <i class="fa-solid fa-chevron-down text-[8px]"></i></div>
                                <div class="dropdown-menu custom-scrollbar" id="filterMenu"></div>
                            </div>
                            <button id="downloadAllBtn" class="hidden w-8 h-8 bg-zinc-900 border border-zinc-800 text-yellow-500 rounded-lg flex items-center justify-center">
                                <i class="fa-solid fa-download text-xs"></i>
                            </button>
                        </div>
                    </div>
                    <div class="scrollable-content-box">
                        <div id="fileList" class="p-2 space-y-1"></div>
                    </div>
                </div>
            </div>

            <!-- PREVIEW -->
            <div class="uniform-panel">
                <div class="panel-body">
                    <h2 class="text-xs font-black uppercase gff border-b border-zinc-900 pb-3 mb-3">Visualizer</h2>
                    <div class="scrollable-content-box" id="previewArea">
                        <div class="w-full h-full flex flex-col items-center justify-center text-zinc-700 space-y-2">
                            <i class="fa-solid fa-eye text-2xl"></i>
                            <p class="text-[9px] gff uppercase tracking-widest">Select Asset</p>
                        </div>
                    </div>
                    <div id="previewControls" class="hidden mt-3 p-2 bg-[#121215] border border-zinc-800 rounded-xl flex items-center justify-between">
                        <p id="mediaTitle" class="text-[10px] font-bold truncate px-2 text-zinc-400"></p>
                        <a id="singleSaveBtn" href="#" class="w-8 h-8 flex items-center justify-center bg-zinc-800 rounded-lg hover:bg-yellow-500 hover:text-black transition-all">
                            <i class="fa-solid fa-arrow-down text-xs"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Download Choice Modal -->
    <div id="downloadModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="bg-[#0f0f0f] border border-zinc-800 p-6 rounded-3xl w-full max-w-sm shadow-2xl">
            <h3 class="text-center gff italic text-lg mb-4">DOWNLOAD OPTIONS</h3>
            <div class="space-y-3">
                <button onclick="executeDownload('normal')" class="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-2xl text-left hover:border-yellow-500 group transition-all">
                    <p class="text-xs font-black gff group-hover:text-yellow-500">NORMAL ZIP</p>
                    <p class="text-[10px] text-zinc-500">All assets in one folder</p>
                </button>
                <button onclick="executeDownload('grouped')" class="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-2xl text-left hover:border-emerald-500 group transition-all">
                    <p class="text-xs font-black gff group-hover:text-emerald-500">GROUPED / MAPPED</p>
                    <p class="text-[10px] text-zinc-500">Sorted into Audio, Textures, Meshes...</p>
                </button>
                <button onclick="executeDownload('filtered')" id="btnFilteredZip" class="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-2xl text-left hover:border-cyan-500 group transition-all">
                    <p class="text-xs font-black gff group-hover:text-cyan-500">FILTERED ONLY</p>
                    <p class="text-[10px] text-zinc-500">Only download visible assets</p>
                </button>
            </div>
            <button onclick="toggleModal(false)" class="w-full mt-4 py-2 text-[10px] text-zinc-600 font-bold uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <script>
        let assetCache = [];
        let selectedFilters = new Set();
        const fInput = document.getElementById('fileInput');
        
        // --- Core Functions ---
        const toggleModal = (show) => document.getElementById('downloadModal').style.display = show ? 'flex' : 'none';

        fInput.onchange = (e) => {
            const f = e.target.files[0];
            if(f) document.getElementById('fileLabel').innerText = f.name;
        };

        document.getElementById('extractorForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!fInput.files[0]) return;
            
            const fd = new FormData();
            fd.append('asset_bundle', fInput.files[0]);
            
            updateStatus("RUNNING", "Extracting...", "fa-gear animate-spin", "#ffde00");
            
            try {
                const res = await fetch('/api/extract', { method: 'POST', body: fd });
                const data = await res.json();
                if(data.error) throw data.error;
                
                assetCache = data.files;
                renderFilterMenu();
                renderList();
                document.getElementById('downloadAllBtn').classList.remove('hidden');
                updateStatus("SUCCESS", `Loaded ${assetCache.length} assets`, "fa-check", "#00ffa3");
            } catch(err) {
                updateStatus("ERROR", err, "fa-triangle-exclamation", "#ff3e3e");
            }
        };

        function updateStatus(badge, text, icon, color) {
            const b = document.getElementById('statusBadge');
            b.innerText = badge; b.style.borderColor = color; b.style.color = color;
            document.getElementById('statusText').innerText = text;
            document.getElementById('statusIcon').className = `fa-solid ${icon}`;
            document.getElementById('statusIcon').style.color = color;
        }

        function renderFilterMenu() {
            const types = [...new Set(assetCache.map(a => a.label))].sort();
            const menu = document.getElementById('filterMenu');
            menu.innerHTML = `<div class="dropdown-item" onclick="toggleFilter('ALL')">All Assets</div>`;
            types.forEach(t => {
                menu.innerHTML += `<div class="dropdown-item filter-opt" data-type="${t}" onclick="toggleFilter('${t}')">
                    <i class="fa-regular fa-square"></i> ${t}
                </div>`;
            });
            document.querySelector('.dropdown-trigger').onclick = () => {
                menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            };
        }

        function toggleFilter(type) {
            if(type === 'ALL') {
                selectedFilters.clear();
            } else {
                if(selectedFilters.has(type)) selectedFilters.delete(type);
                else selectedFilters.add(type);
            }
            document.querySelectorAll('.filter-opt').forEach(opt => {
                const t = opt.dataset.type;
                opt.classList.toggle('active', selectedFilters.has(t));
                opt.querySelector('i').className = selectedFilters.has(t) ? 'fa-solid fa-square-check' : 'fa-regular fa-square';
            });
            renderList();
        }

        function renderList() {
            const container = document.getElementById('fileList');
            container.innerHTML = "";
            const filtered = selectedFilters.size === 0 ? assetCache : assetCache.filter(a => selectedFilters.has(a.label));
            
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = "p-2 bg-[#0d0d12] border border-zinc-900 rounded-xl flex items-center gap-3 cursor-pointer hover:border-zinc-600 transition-all group";
                div.onclick = () => showPreview(item);
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-lg bg-zinc-900 flex items-center justify-center text-[10px] text-zinc-500 group-hover:text-yellow-500">
                        <i class="${getIcon(item.label)}"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-[11px] font-bold text-zinc-300 truncate">${item.name}</p>
                        <p class="text-[8px] uppercase text-zinc-600 font-black tracking-tighter">${item.label}</p>
                    </div>
                `;
                container.appendChild(div);
            });
            document.getElementById('cacheCounterText').innerText = `${filtered.length} visible / ${assetCache.length} total`;
        }

        function getIcon(label) {
            const l = label.toLowerCase();
            if(l.includes('image') || l.includes('texture')) return 'fa-solid fa-image';
            if(l.includes('audio')) return 'fa-solid fa-waveform-lines';
            if(l.includes('mesh')) return 'fa-solid fa-cube';
            if(l.includes('video')) return 'fa-solid fa-play';
            return 'fa-solid fa-file-code';
        }

        async function showPreview(item) {
            const area = document.getElementById('previewArea');
            const controls = document.getElementById('previewControls');
            area.innerHTML = `<div class="p-10"><i class="fa-solid fa-circle-notch animate-spin text-yellow-500"></i></div>`;
            controls.classList.remove('hidden');
            document.getElementById('mediaTitle').innerText = item.name;
            const url = `/api/extract?download_type=single&file_index=${item.index}`;
            document.getElementById('singleSaveBtn').href = url;

            const ext = item.name.split('.').pop().toLowerCase();
            if(['png','jpg','webp'].includes(ext)) {
                area.innerHTML = `<img src="${url}" class="pixelated-render">`;
            } else if(['mp3','wav','ogg'].includes(ext)) {
                area.innerHTML = `
                    <div class="p-6 w-full text-center" id="waveContainer">
                        <div class="wave-container mb-4">${Array(20).fill('<div class="bar"></div>').join('')}</div>
                        <audio id="prevAudio" src="${url}" class="hidden"></audio>
                        <button onclick="toggleAudio()" class="w-12 h-12 rounded-full bg-cyan-400 text-black shadow-lg shadow-cyan-900/20"><i class="fa-solid fa-play" id="playIcon"></i></button>
                        <div class="mt-4 h-1 bg-zinc-900 rounded-full overflow-hidden"><div id="audioProg" class="h-full bg-cyan-400 w-0"></div></div>
                    </div>`;
                const a = document.getElementById('prevAudio');
                a.ontimeupdate = () => {
                    document.getElementById('audioProg').style.width = (a.currentTime/a.duration*100)+'%';
                };
            } else if(['mp4'].includes(ext)) {
                area.innerHTML = `<video src="${url}" controls class="max-h-full"></video>`;
            } else {
                try {
                    const text = await (await fetch(url)).text();
                    area.innerHTML = `<pre class="text-[10px] text-zinc-500 p-4 whitespace-pre-wrap font-mono text-left w-full">${text.slice(0, 5000)}</pre>`;
                } catch { area.innerHTML = `<i class="fa-solid fa-file-binary text-4xl text-zinc-800"></i>`; }
            }
        }

        function toggleAudio() {
            const a = document.getElementById('prevAudio');
            const btn = document.getElementById('playIcon');
            const wrap = document.getElementById('waveContainer');
            if(a.paused) { a.play(); btn.className = 'fa-solid fa-pause'; wrap.classList.add('playing'); }
            else { a.pause(); btn.className = 'fa-solid fa-play'; wrap.classList.remove('playing'); }
        }

        document.getElementById('downloadAllBtn').onclick = () => toggleModal(true);

        function executeDownload(type) {
            let url = `/api/extract?download_type=zip`;
            if(type === 'grouped') url += `&grouped=true`;
            if(type === 'filtered') {
                const filtered = assetCache.filter(a => selectedFilters.has(a.label));
                const indices = filtered.map(a => a.index).join(',');
                url += `&indices=${indices}`;
            }
            window.location.href = url;
            toggleModal(false);
        }

        // Close dropdowns
        window.onclick = (e) => {
            if (!e.target.closest('.custom-dropdown')) {
                document.getElementById('filterMenu').style.display = 'none';
            }
        };
    </script>
</body>
</html>
