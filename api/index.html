<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assets Extractor | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @font-face { 
            font-family: 'GFF-Bold'; 
            src: url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff'); 
        }
        
        :root { 
            --ff-yellow: #ffde00; 
            --ff-emerald: #00ffa3; 
            --ff-red: #ff3e3e; 
            --ff-cyan: #38bdf8;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            background: #000; 
            color: #fff; 
            min-height: 100vh; 
            background-image: url('https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/bg_pc.617c669.jpg'); 
            background-size: cover; 
            background-attachment: fixed; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        body::before { 
            content: ""; 
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.93); 
            z-index: -1; 
        }

        .gff { 
            font-family: 'GFF-Bold', sans-serif; 
        }

        /* Outer Panel Container */
        .panel-container { 
            background: #0a0a0a; 
            border: 1px solid #1f1f1f; 
            border-radius: 24px; 
            padding: 24px; 
            position: relative; 
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
        }
        
        .panel-container::before { 
            content: ""; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 4px; 
            height: 100%; 
            background: var(--ff-emerald); 
            border-radius: 24px 0 0 24px; 
        }

        /* True Mechanical Button Feel */
        .btn-mechanical { 
            cursor: pointer; 
            font-family: 'GFF-Bold'; 
            text-transform: uppercase; 
            font-style: italic; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 16px; 
            gap: 12px; 
            position: relative;
            background: var(--ff-emerald); 
            color: #000; 
            box-shadow: 0 5px 0 #00b875;
            transition: background 0.1s ease;
        }
        
        .btn-mechanical:hover {
            background: #2effb3;
        }

        .btn-mechanical:active { 
            transform: translateY(2px);
            box-shadow: 0 3px 0 #00b875;
        }

        /* Premium Dark Mechanical Button */
        .btn-mechanical-dark {
            cursor: pointer; 
            font-family: 'GFF-Bold'; 
            text-transform: uppercase; 
            font-style: italic; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 16px; 
            gap: 12px; 
            position: relative;
            background: #141414; 
            color: #fff; 
            border: 1px solid #262626;
            box-shadow: 0 5px 0 #080808;
            transition: background 0.1s ease, border-color 0.1s ease;
        }

        .btn-mechanical-dark:hover {
            background: #1a1a1a;
            border-color: #333;
        }

        .btn-mechanical-dark:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #080808;
        }

        /* Dropzone Deck Architecture */
        .upload-deck {
            background: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            height: 110px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .upload-deck:hover {
            border-color: #444;
            background: #161616;
        }

        .deck-port {
            width: 80px;
            height: 100%;
            background: #181818;
            border-right: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .deck-port::after {
            content: '';
            position: absolute;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px dashed #333;
            animation: spin 12s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .deck-body {
            flex: 1;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Custom Dropdown Interface Elements */
        .dropdown {
            position: relative;
            width: 100%;
        }

        .dropdown-head {
            height: 58px;
            padding: 0 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #121212;
            border: 1px solid #2a2a2a;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dropdown-head:hover {
            border-color: #444;
            background: #161616;
        }

        .dropdown-text {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        .arrow {
            width: 8px;
            height: 8px;
            border-right: 2px solid var(--ff-emerald);
            border-bottom: 2px solid var(--ff-emerald);
            transform: rotate(45deg);
            transition: 0.25s ease;
            margin-top: -3px;
        }

        .dropdown.active .arrow {
            transform: rotate(225deg);
            margin-top: 3px;
        }

        .dropdown-menu {
            position: absolute;
            top: 64px;
            left: 0;
            width: 100%;
            background: #111111;
            border: 1px solid #333;
            border-radius: 16px;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: 0.2s ease;
            z-index: 99;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        }

        .dropdown.active .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            padding: 14px 20px;
            font-size: 13px;
            cursor: pointer;
            color: #e4e4e7;
            transition: all 0.2s;
            border-bottom: 1px solid #1f1f1f;
        }
        
        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: var(--ff-emerald);
            color: #000;
        }

        /* Status Window Display */
        .status-window { 
            background: #121212; 
            border: 1px solid #2a2a2a; 
            height: 64px; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            gap: 15px; 
        }
        
        .progress-bar-small { 
            height: 4px; 
            background: #1a1a1a; 
            border-radius: 2px; 
            flex: 1; 
            overflow: hidden; 
            position: relative; 
        }
        
        .progress-fill-small { 
            position: absolute; 
            left: 0; top: 0; 
            height: 100%; 
            background: var(--ff-emerald); 
            width: 0%; 
            transition: 0.2s; 
        }

        /* Horizontal Ping-Pong Scanner Animation */
        .progress-fill-small.processing-active {
            width: 30% !important;
            animation: trackSweep 1.2s ease-in-out infinite alternate;
        }

        @keyframes trackSweep {
            0% { left: 0%; }
            100% { left: 70%; }
        }

        /* Live Matrix Renderer Window Box */
        .live-render-box {
            position: relative;
            width: 100%;
            border-radius: 16px;
            background: #121212;
            border: 1px solid #2a2a2a;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 220px;
            overflow: hidden;
        }

        .live-render-box::before {
            content: "";
            position: absolute;
            inset: 0;
            background-size: 4px 4px;
            background-image: linear-gradient(to right, rgba(255,255,255,0.01) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.01) 1px, transparent 1px);
            pointer-events: none;
            z-index: 1;
        }

        .preview-wrapper {
            position: relative;
            max-width: 100%;
            max-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .pixel-scanner-line {
            display: none;
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--ff-emerald), transparent);
            box-shadow: 0 0 12px 2px var(--ff-emerald);
            z-index: 10;
            animation: hardwareScan 2s linear infinite;
        }

        @keyframes hardwareScan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .loading-ring-container {
            display: none;
            position: relative;
            width: 50px;
            height: 50px;
        }

        .loading-ring-node {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top-color: var(--ff-emerald);
            border-radius: 50%;
            animation: spinning 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        .loading-ring-node:nth-child(2) { animation-delay: -0.15s; border-top-color: #333; }
        .loading-ring-node:nth-child(3) { animation-delay: -0.3s; border-top-color: #555; }

        @keyframes spinning {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #222;
            margin-bottom: 20px;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--ff-emerald);
            box-shadow: 0 0 10px var(--ff-emerald);
        }
    </style>
</head>
<body>

<header class="w-full flex justify-center items-center h-16 bg-black border-b-2 border-[#00ffa3] sticky top-0 z-50">
    <img src="https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png" class="h-7" alt="Logo">
</header>

<div class="w-full max-w-[480px] mx-auto px-4 pb-16">
    
    <div class="text-center my-10 gff">
        <div class="flex justify-center">
            <div class="badge">
                <div class="badge-dot"></div>
                <span class="text-[10px] uppercase tracking-widest font-bold text-zinc-400">PACK ⇆ EXTRACT</span>
            </div>
        </div>
        <span class="text-[54px] font-black italic block leading-[0.75]">ASSETS</span>
        <span class="text-[54px] font-black italic block text-[#00ffa3] leading-[0.85]">EXTRACTOR</span>
    </div>

    <div class="panel-container space-y-5">
        
        <form id="extractorForm" class="space-y-4">
            
            <div class="upload-deck" onclick="fileInput.click()">
                <div class="deck-port">
                    <i id="uploadIcon" class="fa-solid fa-file-zipper text-xl text-zinc-500 transition-colors"></i>
                </div>
                <div class="deck-body">
                    <span id="fileStatusText" class="text-[9px] font-bold tracking-widest text-zinc-500 gff mb-1 uppercase">UPLOAD PACKAGE</span>
                    <p id="fileLabel" class="gff text-[12px] text-zinc-300 uppercase tracking-wide truncate">Click to Load Asset File</p>
                </div>
            </div>
            <input type="file" id="fileInput" class="hidden" required>

            <div class="dropdown" id="modeDropdown">
                <div class="dropdown-head" onclick="toggleDropdown()">
                    <div class="dropdown-text gff uppercase tracking-wide" id="selectedModeText">Extract Assets (Decompress)</div>
                    <div class="arrow"></div>
                </div>
                <div class="dropdown-menu">
                    <div class="dropdown-item gff uppercase tracking-wide" onclick="changeMode('extract', 'Extract Assets (Decompress)')">Extract Assets (Decompress)</div>
                    <div class="dropdown-item gff uppercase tracking-wide" onclick="changeMode('pack', 'Pack Assets (Compress)')">Pack Assets (Compress)</div>
                </div>
            </div>
            
            <button type="submit" class="btn-mechanical w-full h-16 text-lg font-bold italic">
                <i class="fa-solid fa-boxes-packing text-md"></i>
                RUN EXTRACTOR
            </button>
        </form>

        <div class="status-window">
            <div id="statusIcon" class="w-5 h-5 flex items-center justify-center text-zinc-500">
                <i class="fa-solid fa-folder-tree text-sm"></i>
            </div>
            <div class="flex flex-col flex-1 gap-1">
                <span id="statusText" class="gff text-[9px] uppercase tracking-widest text-zinc-400">Output Log</span>
                <div class="progress-bar-small"><div id="progressFill" class="progress-fill-small"></div></div>
            </div>
            <span id="statusBadge" class="text-[9px] font-black uppercase text-zinc-400 bg-zinc-900 px-2.5 py-1 rounded-md border border-zinc-800 gff tracking-wider">Unmapped</span>
        </div>

        <div class="live-render-box">
            <div class="pixel-scanner-line" id="scannerLine"></div>

            <div class="text-center space-y-2" id="outputEmptyState">
                <i class="fa-solid fa-cubes text-2xl text-zinc-800 animate-spin" style="animation-duration: 6s;"></i>
                <div class="gff text-[10px] text-zinc-600 uppercase tracking-widest">Extracted sequence maps appear here</div>
            </div>

            <div class="loading-ring-container" id="outputLoader">
                <div class="loading-ring-node"></div>
                <div class="loading-ring-node"></div>
                <div class="loading-ring-node"></div>
            </div>

            <div class="w-full hidden text-center space-y-4" id="outputResultView">
                <div class="flex flex-col items-center justify-center p-4 bg-[#161616] border border-zinc-800 rounded-xl">
                    <i class="fa-solid fa-file-shield text-4xl text-[#00ffa3] mb-2 drop-shadow-[0_0_10px_rgba(0,255,163,0.3)]"></i>
                    <span id="resultMetaText" class="gff text-xs text-zinc-300 uppercase tracking-wide">Payload Extracted Successfully</span>
                </div>
                <div class="flex justify-center">
                    <a id="fileDownloadAnchor" href="#" download class="btn-mechanical-dark w-full max-w-[240px] h-14 text-xs font-bold italic tracking-widest">
                        <i class="fa-solid fa-download text-xs text-zinc-400"></i> FETCH ASSETS
                    </a>
                </div>
            </div>

        </div>

    </div>
</div>

<script>
    let extractionMode = "extract";

    const fileInput = document.getElementById("fileInput");
    const fileLabel = document.getElementById("fileLabel");
    const fileStatusText = document.getElementById("fileStatusText");
    const uploadIcon = document.getElementById("uploadIcon");
    const progressFill = document.getElementById("progressFill");
    const statusBadge = document.getElementById("statusBadge");
    const statusText = document.getElementById("statusText");
    const statusIcon = document.getElementById("statusIcon");
    const outputEmptyState = document.getElementById("outputEmptyState");
    const outputLoader = document.getElementById("outputLoader");
    const outputResultView = document.getElementById("outputResultView");
    const scannerLine = document.getElementById("scannerLine");
    const fileDownloadAnchor = document.getElementById("fileDownloadAnchor");

    function toggleDropdown() {
        document.getElementById("modeDropdown").classList.toggle("active");
    }

    function changeMode(modeVal, labelText) {
        extractionMode = modeVal;
        document.getElementById("selectedModeText").innerText = labelText;
        document.getElementById("modeDropdown").classList.remove("active");
    }

    document.addEventListener("click", function(event) {
        const dropBox = document.getElementById("modeDropdown");
        if (!dropBox.contains(event.target)) {
            dropBox.classList.remove("active");
        }
    });

    fileInput.addEventListener("change", function() {
        if (!this.files[0]) return;
        fileLabel.innerText = this.files[0].name;
        fileLabel.style.color = "var(--ff-emerald)";
        uploadIcon.style.color = "var(--ff-emerald)";
        fileStatusText.innerText = "PACKAGE VALIDATED";
        fileStatusText.style.color = "var(--ff-emerald)";
    });

    function beginProcessingState(fileName) {
        outputEmptyState.style.display = "none";
        outputResultView.classList.add("hidden");
        outputLoader.style.display = "block";
        scannerLine.style.display = "block";
        progressFill.classList.add("processing-active");

        statusBadge.innerText = "PARSING";
        statusBadge.style.color = "var(--ff-emerald)";
        statusText.innerText = "Analyzing Manifest Indexes...";
        statusIcon.innerHTML = `<i class="fa-solid fa-microchip text-sm text-[#00ffa3] animate-pulse"></i>`;

        animateFilenameTransform(fileName);
    }

    function animateFilenameTransform(fileName) {
        const extension = extractionMode === "extract" ? "_extracted.zip" : "_packed.bin";
        const cleanName = fileName.replace(/\.[^/.]+$/, "");
        let dots = 0;

        const interval = setInterval(() => {
            dots++;
            if (dots > 3) dots = 1;
            statusText.innerText = `Extracting ${cleanName}${extension} ${".".repeat(dots)}`;
        }, 350);

        window.processingInterval = interval;
    }

    function finishProcessingState() {
        clearInterval(window.processingInterval);
        progressFill.classList.remove("processing-active");
        outputLoader.style.display = "none";
        scannerLine.style.display = "none";

        statusBadge.innerText = "SUCCESS";
        statusBadge.style.color = "var(--ff-emerald)";
        statusText.innerText = "Assets Dumped Successfully";
        statusIcon.innerHTML = `<i class="fa-solid fa-circle-check text-sm text-[#00ffa3]"></i>`;
    }

    function failProcessingState() {
        clearInterval(window.processingInterval);
        progressFill.classList.remove("processing-active");
        outputLoader.style.display = "none";
        scannerLine.style.display = "none";
        outputEmptyState.style.display = "flex";

        statusBadge.innerText = "TERMINATED";
        statusBadge.style.color = "var(--ff-red)";
        statusText.innerText = "Extraction Failed (Bad Table)";
        statusIcon.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-sm text-[#ff3e3e]"></i>`;
    }

    document.getElementById("extractorForm").addEventListener("submit", async function(event) {
        event.preventDefault();
        const uploadedFile = fileInput.files[0];
        if (!uploadedFile) return;

        beginProcessingState(uploadedFile.name);

        const multiFormPayload = new FormData();
        multiFormPayload.append("file", uploadedFile);
        multiFormPayload.append("mode", extractionMode);

        try {
            // Emulate processing lag window for mechanical validation animations
            await new Promise(resolve => setTimeout(resolve, 2000));

            const response = await fetch("/api/convert", { 
                method: "POST",
                body: multiFormPayload
            });

            if (!response.ok) throw new Error("Manifest runtime mapping failed");

            const blob = await response.blob();
            const blobURL = URL.createObjectURL(blob);

            finishProcessingState();
            outputResultView.classList.remove("hidden");

            const finalName = extractionMode === "extract"
                ? uploadedFile.name.replace(/\.[^/.]+$/, "_extracted.zip")
                : uploadedFile.name.replace(/\.[^/.]+$/, "_packed.bin");

            fileDownloadAnchor.href = blobURL;
            fileDownloadAnchor.download = finalName;

        </script>
</body>
</html>
