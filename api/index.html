<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AssetBundle Extractor</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/wavesurfer.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'GFF-Bold'; src: url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff'); }
:root { --ff-yellow: #ffde00; --ff-emerald: #00ffa3; --ff-red: #ff3e3e; --ff-cyan: #38bdf8; }
body { background: #000; color: #fff; min-height: 100vh; background-image: url('https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/bg_pc.617c669.jpg'); background-size: cover; background-attachment: fixed; font-family: 'Inter', sans-serif; overflow-x: hidden; }
body::before { content: ""; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.94); z-index: -1; }
.gff { font-family: 'GFF-Bold', sans-serif; }
.main-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.uniform-panel { background: #0a0a0a; border: 1px solid #1f1f1f; position: relative; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8); height: 420px; display: flex; flex-direction: column; }
.panel-left { border-radius: 0; }
.panel-mid { border-radius: 0; }
.panel-right { border-radius: 0 24px 24px 0; }
@media (max-width: 1023px) { .uniform-panel { height: auto; border-radius: 16px !important; margin-bottom: 16px; } }
.panel-body { padding: 24px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.scrollable-content-box { flex: 1; background: #060608; border: 1px solid #1a1a1f; border-radius: 16px; overflow-y: auto; position: relative; min-height: 200px; }
.btn-mechanical { cursor: pointer; font-family: 'GFF-Bold'; text-transform: uppercase; font-style: italic; display: flex; align-items: center; justify-content: center; border-radius: 16px; gap: 12px; position: relative; background: var(--ff-yellow); color: #000; box-shadow: 0 5px 0 #c2a900; transition: all 0.1s ease; }
.btn-mechanical:active { transform: translateY(2px); box-shadow: 0 3px 0 #c2a900; }
.upload-deck { background: #121212; border: 2px dashed #2a2a2a; border-radius: 20px; display: flex; align-items: center; height: 110px; cursor: pointer; transition: all 0.2s ease; }
.upload-deck.dragover { border-color: var(--ff-yellow); background: #161612; }
.custom-dropdown { position: relative; user-select: none; }
.dropdown-header { background: #121216; border: 1px solid #272732; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 11px; display: flex; justify-content: space-between; align-items: center; min-width: 140px; }
.dropdown-list { position: absolute; top: 110%; left: 0; width: 100%; background: #0f0f12; border: 1px solid #272732; border-radius: 8px; z-index: 50; display: none; max-height: 200px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.dropdown-item { padding: 8px 12px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.dropdown-item:hover { background: #1a1a22; }
.dropdown-item.selected { color: var(--ff-yellow); }
.pixelated-render { image-rendering: pixelated; max-width: 100%; max-height: 100%; object-fit: contain; }
.waveform-container { width: 100%; height: 80px; background: #050507; border-radius: 12px; margin: 10px 0; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-card { background: #0f0f12; border: 1px solid #2a2a2a; border-radius: 24px; padding: 30px; width: 90%; max-width: 400px; text-align: center; }
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #222227; border-radius: 10px; }
</style>
</head>
<body>
<div class="main-container">
    <div class="flex items-center justify-center gap-4 mt-8 mb-2">
        <svg class="w-8 h-8 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
        <div class="text-center gff">
            <span class="text-[40px] md:text-[54px] font-black italic block leading-[0.75]">ASSETS</span>
            <span class="text-[40px] md:text-[54px] font-black italic block text-[#ffde00] leading-[0.85]">EXTRACTOR</span>
        </div>
        <svg class="w-8 h-8 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
    </div>
    <p class="text-center text-zinc-500 text-xs font-bold tracking-[0.2em] mb-10 uppercase">AssetBundle • KTX • Unity Assets Extractor</p>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-0">
        <div class="uniform-panel panel-left">
            <div class="panel-body">
                <h2 class="text-xs font-black text-white uppercase tracking-wider mb-1 gff">Upload File</h2>
                <form id="extractorForm" class="flex-1 flex flex-col justify-center space-y-4">
                    <div class="upload-deck" id="dropZone" onclick="document.getElementById('fileInput').click()">
                        <div class="px-6 border-r border-zinc-800"><i class="fa-solid fa-folder-open text-zinc-500"></i></div>
                        <div class="px-4 truncate">
                            <span class="text-[9px] font-bold text-zinc-500 uppercase gff">Source</span>
                            <p id="fileLabel" class="text-xs text-zinc-300 truncate gff italic">Drag & Drop Asset</p>
                        </div>
                    </div>
                    <input type="file" id="fileInput" class="hidden">
                    <button type="submit" class="btn-mechanical h-14 text-sm font-bold italic"><i class="fa-solid fa-bolt"></i> Extract Now</button>
                </form>
                <div class="mt-4 bg-[#121212] border border-[#2a2a2a] p-3 rounded-xl flex items-center gap-3">
                    <i id="statusIcon" class="fa-solid fa-terminal text-zinc-500 text-xs"></i>
                    <div class="flex-1 overflow-hidden">
                        <span id="statusBadge" class="text-[8px] font-black uppercase text-zinc-400 bg-zinc-900 px-1.5 py-0.5 rounded">Ready</span>
                        <p id="statusDescText" class="text-[10px] text-zinc-500 truncate mt-0.5">Idle</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="uniform-panel panel-mid">
            <div class="panel-body">
                <div class="flex items-center justify-between mb-4 border-b border-zinc-900 pb-3">
                    <div>
                        <h2 class="text-xs font-black text-white uppercase tracking-wider gff">Library</h2>
                        <p id="cacheCounterText" class="text-[10px] text-zinc-600">0 Items</p>
                    </div>
                    <div class="flex gap-2">
                        <div class="custom-dropdown" id="typeFilter">
                            <div class="dropdown-header" onclick="toggleDropdown()">
                                <span id="filterLabel">All Types</span>
                                <i class="fa-solid fa-chevron-down text-[8px]"></i>
                            </div>
                            <div class="dropdown-list custom-scrollbar" id="filterList"></div>
                        </div>
                        <button id="downloadAllBtn" class="hidden h-8 w-8 bg-[#121216] border border-[#2a2a32] text-[#ffde00] rounded-lg items-center justify-center"><i class="fa-solid fa-download text-xs"></i></button>
                    </div>
                </div>
                <div class="scrollable-content-box">
                    <div id="fileList" class="p-2 space-y-1"></div>
                    <div id="listEmptyState" class="absolute inset-0 flex flex-col items-center justify-center text-zinc-800">
                        <i class="fa-solid fa-box-open text-2xl mb-2"></i>
                        <span class="text-[9px] uppercase font-bold gff">Empty Cache</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="uniform-panel panel-right">
            <div class="panel-body">
                <h2 class="text-xs font-black text-white uppercase tracking-wider mb-4 gff">Preview Inspector</h2>
                <div class="scrollable-content-box bg-black flex flex-col">
                    <div id="previewArea" class="flex-1 flex items-center justify-center relative overflow-hidden">
                        <i class="fa-solid fa-eye text-4xl text-zinc-900"></i>
                    </div>
                    <div id="previewMeta" class="hidden p-3 bg-[#0a0a0c] border-t border-zinc-900 flex items-center justify-between gap-3">
                        <div class="overflow-hidden">
                            <p id="mediaTitle" class="text-[11px] font-bold text-zinc-300 truncate"></p>
                            <span id="mediaType" class="text-[8px] text-zinc-600 uppercase font-black">Unknown</span>
                        </div>
                        <a id="singleSaveBtn" href="#" class="h-9 w-9 bg-zinc-900 border border-zinc-800 rounded-lg flex items-center justify-center text-white hover:bg-[#ffde00] hover:text-black transition-all">
                            <i class="fa-solid fa-download text-xs"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="zipModal">
    <div class="modal-card">
        <h3 class="gff text-xl mb-2 italic text-[#ffde00]">DOWNLOAD ZIP</h3>
        <p class="text-zinc-500 text-xs mb-6">Choose how you want to package your assets.</p>
        <div class="grid gap-3">
            <button onclick="triggerZip('normal')" class="btn-mechanical h-12 text-xs">Normal Download</button>
            <button onclick="triggerZip('grouped')" class="btn-mechanical h-12 text-xs bg-cyan-400 shadow-[0_5px_0_#0891b2]">Grouped Folders</button>
            <button onclick="closeZipModal()" class="text-zinc-600 text-[10px] font-bold uppercase mt-2">Cancel</button>
        </div>
    </div>
</div>

<script>
let activeCache = [];
let selectedTypes = new Set();
let wavesurfer = null;

function toggleDropdown() {
    const list = document.getElementById('filterList');
    list.style.display = list.style.display === 'block' ? 'none' : 'block';
}

function updateFilter(type) {
    if (type === 'ALL') {
        selectedTypes.clear();
    } else {
        if (selectedTypes.has(type)) selectedTypes.delete(type);
        else selectedTypes.add(type);
    }
    renderList();
    updateFilterUI();
}

function updateFilterUI() {
    const label = document.getElementById('filterLabel');
    label.innerText = selectedTypes.size === 0 ? "All Types" : `${selectedTypes.size} Selected`;
    const items = document.querySelectorAll('.dropdown-item');
    items.forEach(item => {
        const val = item.getAttribute('data-value');
        item.classList.toggle('selected', val === 'ALL' ? selectedTypes.size === 0 : selectedTypes.has(val));
    });
}

function renderList() {
    const list = document.getElementById('fileList');
    const empty = document.getElementById('listEmptyState');
    list.innerHTML = "";
    const filtered = activeCache.filter(item => selectedTypes.size === 0 || selectedTypes.has(item.label));
    
    if (filtered.length > 0) {
        empty.style.display = 'none';
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = "p-3 bg-[#111115] border border-zinc-900 rounded-xl flex items-center gap-3 cursor-pointer hover:border-zinc-700 group transition-all";
            div.onclick = () => selectFile(item);
            div.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-zinc-900 flex items-center justify-center text-[10px] text-zinc-500 group-hover:text-yellow-500"><i class="fa-solid ${getIcon(item.label)}"></i></div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-[11px] font-bold text-zinc-300 truncate group-hover:text-white">${item.name}</p>
                    <span class="text-[8px] font-black text-zinc-600 uppercase tracking-tighter">${item.label}</span>
                </div>
            `;
            list.appendChild(div);
        });
    } else {
        empty.style.display = 'flex';
    }
    document.getElementById('cacheCounterText').innerText = `${filtered.length} Items Listed`;
}

function getIcon(label) {
    const l = label.toLowerCase();
    if (l.includes('texture') || l.includes('sprite')) return 'fa-image';
    if (l.includes('audio')) return 'fa-volume-high';
    if (l.includes('video')) return 'fa-film';
    if (l.includes('mesh')) return 'fa-cube';
    if (l.includes('font')) return 'fa-font';
    if (l.includes('json') || l.includes('text')) return 'fa-file-lines';
    return 'fa-file';
}

function selectFile(item) {
    const area = document.getElementById('previewArea');
    const meta = document.getElementById('previewMeta');
    const title = document.getElementById('mediaTitle');
    const type = document.getElementById('mediaType');
    const btn = document.getElementById('singleSaveBtn');
    
    meta.classList.remove('hidden');
    title.innerText = item.name;
    type.innerText = item.label;
    btn.href = `/api/extract?download_type=single&file_index=${item.index}`;
    area.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-zinc-800 text-2xl"></i>';

    const url = `/api/extract?download_type=single&file_index=${item.index}`;
    const ext = item.name.split('.').pop().toLowerCase();

    if (['png','jpg','webp'].includes(ext)) {
        area.innerHTML = `<img src="${url}" class="pixelated-render">`;
    } else if (['mp3','wav','ogg'].includes(ext)) {
        area.innerHTML = `
            <div class="w-full px-6">
                <div id="waveform" class="waveform-container"></div>
                <div class="flex items-center justify-center gap-6 mt-4">
                    <button onclick="wavesurfer.skip(-5)" class="text-zinc-500 hover:text-white"><i class="fa-solid fa-backward"></i></button>
                    <button id="playBtn" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center"><i class="fa-solid fa-play"></i></button>
                    <button onclick="wavesurfer.skip(5)" class="text-zinc-500 hover:text-white"><i class="fa-solid fa-forward"></i></button>
                </div>
            </div>
        `;
        if (wavesurfer) wavesurfer.destroy();
        wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#1a1a24',
            progressColor: '#38bdf8',
            cursorColor: '#ffde00',
            height: 80,
            responsive: true,
            barWidth: 2
        });
        wavesurfer.load(url);
        wavesurfer.on('ready', () => wavesurfer.play());
        const pBtn = document.getElementById('playBtn');
        pBtn.onclick = () => {
            wavesurfer.playPause();
            pBtn.innerHTML = wavesurfer.isPlaying() ? '<i class="fa-solid fa-pause"></i>' : '<i class="fa-solid fa-play"></i>';
        };
    } else if (ext === 'mp4') {
        area.innerHTML = `<video src="${url}" controls class="max-w-full max-h-full"></video>`;
    } else if (['json','txt','atlas','obj'].includes(ext)) {
        fetch(url).then(r => r.text()).then(txt => {
            area.innerHTML = `<pre class="p-4 text-[9px] font-mono text-zinc-500 overflow-auto w-full h-full text-left">${txt.slice(0, 5000)}</pre>`;
        });
    } else {
        area.innerHTML = `<div class="text-center"><i class="fa-solid fa-file-circle-question text-4xl text-zinc-900 mb-2"></i><p class="text-[10px] text-zinc-700 font-bold uppercase">No Preview</p></div>`;
    }
}

document.getElementById('extractorForm').onsubmit = async (e) => {
    e.preventDefault();
    const file = document.getElementById('fileInput').files[0];
    if (!file) return;
    
    const badge = document.getElementById('statusBadge');
    const desc = document.getElementById('statusDescText');
    const icon = document.getElementById('statusIcon');
    
    badge.innerText = "RUNNING";
    badge.style.color = "var(--ff-yellow)";
    desc.innerText = "Extracting assets...";
    icon.className = "fa-solid fa-gear fa-spin text-yellow-500";
    
    const fd = new FormData();
    fd.append('asset_bundle', file);
    
    try {
        const res = await fetch('/api/extract', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        activeCache = data.files;
        
        const types = ['ALL', ...new Set(activeCache.map(i => i.label))];
        const fList = document.getElementById('filterList');
        fList.innerHTML = types.map(t => `<div class="dropdown-item" data-value="${t}" onclick="updateFilter('${t}')">${t}</div>`).join('');
        
        renderList();
        document.getElementById('downloadAllBtn').style.display = 'flex';
        badge.innerText = "SUCCESS";
        badge.style.color = "var(--ff-emerald)";
        desc.innerText = `Loaded ${activeCache.length} assets.`;
        icon.className = "fa-solid fa-check-double text-emerald-500";
    } catch (err) {
        badge.innerText = "ERROR";
        badge.style.color = "var(--ff-red)";
        desc.innerText = err.message;
        icon.className = "fa-solid fa-triangle-exclamation text-red-500";
    }
};

document.getElementById('downloadAllBtn').onclick = () => {
    document.getElementById('zipModal').style.display = 'flex';
};

function closeZipModal() {
    document.getElementById('zipModal').style.display = 'none';
}

function triggerZip(mode) {
    const indices = activeCache
        .filter(item => selectedTypes.size === 0 || selectedTypes.has(item.label))
        .map(item => item.index)
        .join(',');
    window.location.href = `/api/extract?download_type=zip&mode=${mode}&indices=${indices}`;
    closeZipModal();
}

document.getElementById('fileInput').onchange = (e) => {
    const f = e.target.files[0];
    if (f) document.getElementById('fileLabel').innerText = f.name;
};

window.onclick = (e) => {
    if (!e.target.closest('.custom-dropdown')) {
        document.getElementById('filterList').style.display = 'none';
    }
};
</script>
</body>
</html>
