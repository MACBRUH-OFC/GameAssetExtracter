<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assets Extractor</title>
    <meta name="description" content="Assets Extractor • Assetsbundle, KTX, ASTC extractor for Free Fire made by MACBRUH_FF. Best tool for Unity asset extraction.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'GFF-Bold'; src: url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff'); }
        :root { --ff-yellow: #ffde00; --ff-emerald: #00ffa3; --ff-red: #ff3e3e; --ff-cyan: #38bdf8; }
        body { background: #000; color: #fff; min-height: 100vh; background-image: url('https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/bg_pc.617c669.jpg'); background-size: cover; background-attachment: fixed; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        body::before { content: ""; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.94); z-index: -1; }
        .gff { font-family: 'GFF-Bold', sans-serif; }
        
        .main-container {
            display: grid;
            grid-template-cols: repeat(1, 1fr);
            gap: 1.5rem;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        @media (min-width: 1024px) { .main-container { grid-template-cols: repeat(3, 1fr); } }

        .uniform-panel {
            background: #0a0a0a;
            border: 1px solid #1f1f1f;
            border-radius: 0 24px 24px 0; /* Square Left, Rounded Right */
            position: relative;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            height: 420px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .uniform-panel::before {
            content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--ff-yellow); z-index: 10;
        }
        
        .panel-body { padding: 20px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .scrollable-content-box { flex: 1; background: #060608; border: 1px solid #1a1a1f; border-radius: 12px; overflow-y: auto; position: relative; }
        
        .btn-mechanical {
            cursor: pointer; font-family: 'GFF-Bold'; text-transform: uppercase; font-style: italic;
            display: flex; align-items: center; justify-content: center; border-radius: 12px; gap: 10px;
            background: var(--ff-yellow); color: #000; box-shadow: 0 4px 0 #c2a900; transition: all 0.1s;
        }
        .btn-mechanical:active { transform: translateY(2px); box-shadow: 0 2px 0 #c2a900; }

        /* Custom Dropdown Styling */
        .custom-dropdown { position: relative; width: 100%; }
        .dropdown-trigger {
            background: #121216; border: 1px solid #272732; border-radius: 8px;
            padding: 6px 12px; font-size: 11px; cursor: pointer; display: flex;
            align-items: center; justify-content: space-between; color: #fff;
        }
        .dropdown-menu {
            position: absolute; top: 100%; right: 0; left: 0; background: #16161c;
            border: 1px solid #272732; border-radius: 8px; margin-top: 4px;
            z-index: 50; display: none; max-height: 200px; overflow-y: auto;
        }
        .dropdown-item {
            padding: 8px 12px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .dropdown-item:hover { background: #1f1f27; }
        .dropdown-item input { accent-color: var(--ff-yellow); }

        /* Audio Visualizer */
        .wave-container { display: flex; align-items: center; justify-content: center; gap: 2px; height: 40px; }
        .wave-bar { width: 3px; height: 4px; background: #1f1f2e; border-radius: 1px; transition: height 0.1s ease; }
        
        .pixelated { image-rendering: pixelated; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="p-4 flex flex-col items-center">
        <img src="https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png" class="h-8 mb-4" alt="Logo">
        <div class="w-full h-[1px] bg-zinc-800 relative">
            <div class="absolute left-0 top-0 h-full w-24 bg-[#ffde00]"></div>
        </div>
        
        <div class="text-center mt-6 gff">
            <h1 class="text-4xl md:text-6xl font-black italic leading-none">ASSETS <span class="text-[#ffde00]">EXTRACTOR</span></h1>
            <div class="flex items-center justify-center gap-3 mt-2 text-[10px] md:text-xs text-zinc-400 tracking-[0.2em] font-bold uppercase">
                <i class="fa-solid fa-cube text-[#ffde00]"></i>
                AssetBundle • KTX • ASTC • Assets Extractor
                <i class="fa-solid fa-cube text-[#ffde00]"></i>
            </div>
        </div>
    </header>

    <div class="main-container py-8">
        <!-- 1. UPLOAD -->
        <div class="uniform-panel">
            <div class="panel-body justify-between">
                <div>
                    <h2 class="text-xs font-black uppercase tracking-widest mb-1 gff text-zinc-200">System Injector</h2>
                    <p class="text-[10px] text-zinc-500">Initialize asset pipeline by uploading source bundle.</p>
                </div>
                
                <div id="dropZone" class="flex-1 border-2 border-dashed border-zinc-800 rounded-xl my-4 flex flex-col items-center justify-center cursor-pointer hover:border-[#ffde00] transition-colors group">
                    <input type="file" id="fileInput" class="hidden">
                    <i class="fa-solid fa-cloud-arrow-up text-2xl text-zinc-700 group-hover:text-[#ffde00]"></i>
                    <p id="fileNameDisplay" class="mt-2 text-[11px] font-bold text-zinc-500 gff uppercase truncate max-w-[80%]">Select File</p>
                </div>

                <button id="extractBtn" class="btn-mechanical h-12 w-full text-xs font-bold">
                    <i class="fa-solid fa-bolt-lightning"></i> Extract Pipeline
                </button>

                <div class="mt-4 bg-[#111] border border-zinc-800 p-3 rounded-lg flex items-center gap-3">
                    <div id="statusPulse" class="w-2 h-2 rounded-full bg-zinc-700"></div>
                    <div class="flex flex-col">
                        <span class="text-[9px] font-black text-zinc-500 gff uppercase">Status</span>
                        <p id="statusMsg" class="text-[10px] text-zinc-400">Idle</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. LIST -->
        <div class="uniform-panel" id="listPanel">
            <div class="panel-body">
                <div class="flex items-center justify-between mb-3 border-b border-zinc-900 pb-3">
                    <div>
                        <h2 class="text-xs font-black uppercase tracking-widest gff">Extracted</h2>
                        <p id="itemCount" class="text-[10px] text-zinc-600">0 items</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="custom-dropdown hidden" id="filterArea">
                            <div class="dropdown-trigger" onclick="toggleDropdown('typeDropdown')">
                                <span id="selectedCount">Filters</span>
                                <i class="fa-solid fa-chevron-down text-[8px] text-[#ffde00]"></i>
                            </div>
                            <div class="dropdown-menu custom-scrollbar" id="typeDropdown"></div>
                        </div>
                        <button id="zipActionBtn" class="hidden h-8 w-8 bg-zinc-900 border border-zinc-800 text-[#ffde00] rounded-lg hover:border-[#ffde00] transition-all">
                            <i class="fa-solid fa-file-zipper text-xs"></i>
                        </button>
                    </div>
                </div>

                <div class="scrollable-content-box custom-scrollbar">
                    <div id="listPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center opacity-20">
                        <i class="fa-solid fa-list-check text-4xl mb-2"></i>
                        <span class="text-[10px] gff uppercase">Waiting...</span>
                    </div>
                    <div id="fileItems" class="p-2 space-y-1"></div>
                </div>
            </div>
        </div>

        <!-- 3. PREVIEW -->
        <div class="uniform-panel">
            <div class="panel-body">
                <h2 class="text-xs font-black uppercase tracking-widest mb-3 gff text-zinc-200">Asset Preview</h2>
                <div class="scrollable-content-box bg-black flex flex-col items-center justify-center relative">
                    <div id="previewDefault" class="text-center opacity-30">
                        <i class="fa-solid fa-eye text-3xl mb-2"></i>
                        <p class="text-[9px] font-bold uppercase gff">No Selection</p>
                    </div>
                    <div id="previewStage" class="hidden w-full h-full flex flex-col">
                        <div id="mediaContainer" class="flex-1 flex items-center justify-center overflow-hidden p-4"></div>
                        <div class="p-3 bg-[#0c0c0c] border-t border-zinc-900 flex items-center justify-between">
                            <div class="truncate mr-4">
                                <p id="previewName" class="text-[10px] font-bold text-zinc-300 truncate"></p>
                                <p id="previewSize" class="text-[8px] text-zinc-600 uppercase font-black"></p>
                            </div>
                            <a id="downloadSingle" href="#" class="h-8 w-8 bg-[#ffde00] text-black rounded flex items-center justify-center transition-transform active:scale-90">
                                <i class="fa-solid fa-arrow-down-long text-xs"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ZIP MODAL -->
    <div id="zipModal" class="fixed inset-0 bg-black/80 z-[100] hidden items-center justify-center p-4">
        <div class="bg-[#0f0f0f] border border-zinc-800 p-6 rounded-2xl max-w-sm w-full">
            <h3 class="gff text-lg italic mb-2">DOWNLOAD ZIP</h3>
            <p class="text-[11px] text-zinc-500 mb-6 uppercase tracking-wider">Choose extraction structure</p>
            <div class="space-y-3">
                <button onclick="downloadZip('normal')" class="w-full h-12 bg-zinc-900 border border-zinc-800 rounded-xl flex items-center px-4 gap-4 hover:border-[#ffde00] group">
                    <i class="fa-solid fa-box-open text-zinc-600 group-hover:text-[#ffde00]"></i>
                    <div class="text-left"><p class="text-xs font-bold text-zinc-300">Standard</p><p class="text-[9px] text-zinc-600">All files in root</p></div>
                </button>
                <button onclick="downloadZip('grouped')" class="w-full h-12 bg-zinc-900 border border-zinc-800 rounded-xl flex items-center px-4 gap-4 hover:border-[#ffde00] group">
                    <i class="fa-solid fa-folder-tree text-zinc-600 group-hover:text-[#ffde00]"></i>
                    <div class="text-left"><p class="text-xs font-bold text-zinc-300">Mapped/Grouped</p><p class="text-[9px] text-zinc-600">Organized folders</p></div>
                </button>
                <button id="zipFilteredBtn" onclick="downloadZip('filtered')" class="w-full h-12 bg-zinc-900 border border-zinc-800 rounded-xl flex items-center px-4 gap-4 hover:border-[#ffde00] group">
                    <i class="fa-solid fa-filter text-zinc-600 group-hover:text-[#ffde00]"></i>
                    <div class="text-left"><p class="text-xs font-bold text-zinc-300">Filtered Only</p><p class="text-[9px] text-zinc-600">Based on active filters</p></div>
                </button>
            </div>
            <button onclick="closeZipModal()" class="mt-6 w-full text-[10px] font-black text-zinc-700 uppercase hover:text-white">Cancel</button>
        </div>
    </div>

    <script>
        let allAssets = [];
        let activeFilters = new Set();
        let currentAudio = null;

        const el = {
            fileInput: document.getElementById('fileInput'),
            dropZone: document.getElementById('dropZone'),
            extractBtn: document.getElementById('extractBtn'),
            statusPulse: document.getElementById('statusPulse'),
            statusMsg: document.getElementById('statusMsg'),
            fileItems: document.getElementById('fileItems'),
            itemCount: document.getElementById('itemCount'),
            filterArea: document.getElementById('filterArea'),
            typeDropdown: document.getElementById('typeDropdown'),
            zipActionBtn: document.getElementById('zipActionBtn'),
            previewStage: document.getElementById('previewStage'),
            previewDefault: document.getElementById('previewDefault'),
            mediaContainer: document.getElementById('mediaContainer'),
            previewName: document.getElementById('previewName'),
            previewSize: document.getElementById('previewSize'),
            downloadSingle: document.getElementById('downloadSingle'),
            listPanel: document.getElementById('listPanel')
        };

        el.dropZone.onclick = () => el.fileInput.click();
        el.fileInput.onchange = e => {
            if(e.target.files[0]) document.getElementById('fileNameDisplay').innerText = e.target.files[0].name;
        };

        el.extractBtn.onclick = async () => {
            const file = el.fileInput.files[0];
            if(!file) return;

            el.statusPulse.className = "w-2 h-2 rounded-full bg-yellow-500 animate-pulse";
            el.statusMsg.innerText = "Extracting Assets...";
            el.fileItems.innerHTML = '<div class="flex flex-col items-center py-10"><i class="fa-solid fa-circle-notch animate-spin text-[#ffde00]"></i></div>';

            const fd = new FormData();
            fd.append('asset_bundle', file);

            try {
                const res = await fetch('/api/extract', { method: 'POST', body: fd });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                allAssets = data.files;
                el.itemCount.innerText = `${allAssets.length} items`;
                buildFilterMenu();
                renderList();
                
                el.statusPulse.className = "w-2 h-2 rounded-full bg-[#00ffa3]";
                el.statusMsg.innerText = "Successful Injection";
                el.zipActionBtn.classList.remove('hidden');
                el.filterArea.classList.remove('hidden');

                // Adjust list panel size
                if(allAssets.length < 5) el.listPanel.style.height = "auto";
                else el.listPanel.style.height = "420px";

            } catch (e) {
                el.statusPulse.className = "w-2 h-2 rounded-full bg-red-500";
                el.statusMsg.innerText = e.message;
            }
        };

        function buildFilterMenu() {
            const types = [...new Set(allAssets.map(a => a.label))].sort();
            el.typeDropdown.innerHTML = types.map(t => `
                <div class="dropdown-item" onclick="toggleFilter('${t}', event)">
                    <input type="checkbox" id="chk_${t}" onclick="event.stopPropagation()">
                    <span>${t}</span>
                </div>
            `).join('');
        }

        function toggleDropdown(id) {
            const menu = document.getElementById(id);
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function toggleFilter(type, event) {
            const chk = document.getElementById(`chk_${type}`);
            chk.checked = !chk.checked;
            if(chk.checked) activeFilters.add(type);
            else activeFilters.delete(type);
            
            document.getElementById('selectedCount').innerText = activeFilters.size > 0 ? `${activeFilters.size} Selected` : 'Filters';
            renderList();
        }

        function renderList() {
            document.getElementById('listPlaceholder').classList.add('hidden');
            el.fileItems.innerHTML = '';
            const filtered = allAssets.filter(a => activeFilters.size === 0 || activeFilters.has(a.label));
            
            filtered.forEach(asset => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-2 rounded-lg bg-zinc-900/50 border border-zinc-800 hover:border-zinc-500 cursor-pointer transition-all group";
                div.onclick = () => showPreview(asset);
                div.innerHTML = `
                    <div class="w-8 h-8 rounded bg-zinc-800 flex items-center justify-center text-zinc-500 group-hover:text-[#ffde00]">
                        <i class="fa-solid ${getIcon(asset.label)} text-xs"></i>
                    </div>
                    <div class="flex-1 truncate">
                        <p class="text-[10px] font-bold text-zinc-300 truncate">${asset.name}</p>
                        <p class="text-[8px] text-zinc-600 font-black uppercase">${asset.label}</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-[8px] text-zinc-800"></i>
                `;
                el.fileItems.appendChild(div);
            });
        }

        function getIcon(label) {
            if(label.includes('Texture') || label.includes('Asset')) return 'fa-image';
            if(label.includes('Audio')) return 'fa-volume-high';
            if(label.includes('Mesh')) return 'fa-cube';
            if(label.includes('Video')) return 'fa-clapperboard';
            if(label.includes('Data') || label.includes('Text')) return 'fa-file-lines';
            return 'fa-box';
        }

        async function showPreview(asset) {
            if(currentAudio) currentAudio.pause();
            el.previewDefault.classList.add('hidden');
            el.previewStage.classList.remove('hidden');
            el.previewName.innerText = asset.name;
            el.previewSize.innerText = asset.label;
            el.mediaContainer.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin text-zinc-700"></i>';
            
            const url = `/api/extract?download_type=single&file_index=${asset.index}`;
            el.downloadSingle.href = url;
            el.downloadSingle.download = asset.name;

            const ext = asset.name.split('.').pop().toLowerCase();

            if(['png','jpg','webp'].includes(ext)) {
                el.mediaContainer.innerHTML = `<img src="${url}" class="max-w-full max-h-full pixelated object-contain shadow-2xl">`;
            } else if(['mp3','wav','ogg'].includes(ext)) {
                setupAudioPlayer(url);
            } else if(['mp4'].includes(ext)) {
                el.mediaContainer.innerHTML = `<video src="${url}" controls class="max-w-full max-h-full"></video>`;
            } else if(['json','txt','atlas','obj'].includes(ext)) {
                const txt = await fetch(url).then(r => r.text());
                el.mediaContainer.innerHTML = `<pre class="text-[9px] text-zinc-500 w-full h-full overflow-auto p-2 custom-scrollbar">${txt.slice(0, 5000)}</pre>`;
            } else {
                el.mediaContainer.innerHTML = `<div class="text-center"><i class="fa-solid fa-file-zipper text-4xl text-zinc-800 mb-2"></i><p class="text-[10px] text-zinc-600 gff">No Visual Preview</p></div>`;
            }
        }

        function setupAudioPlayer(url) {
            el.mediaContainer.innerHTML = `
                <div class="w-full px-6 flex flex-col gap-4">
                    <div class="wave-container" id="visualizer">
                        ${Array(24).fill('<div class="wave-bar"></div>').join('')}
                    </div>
                    <div class="flex items-center justify-between bg-zinc-900 p-3 rounded-xl border border-zinc-800">
                        <button id="playBtn" class="w-10 h-10 rounded-full bg-[#38bdf8] text-black flex items-center justify-center transition-transform active:scale-90">
                            <i class="fa-solid fa-play ml-1"></i>
                        </button>
                        <div class="flex-1 mx-4">
                            <div class="h-1 bg-zinc-800 rounded-full overflow-hidden">
                                <div id="audioProgress" class="h-full bg-[#38bdf8] w-0"></div>
                            </div>
                        </div>
                        <span id="audioTime" class="text-[10px] font-mono text-zinc-500">0:00</span>
                    </div>
                </div>
            `;

            const audio = new Audio(url);
            currentAudio = audio;
            const playBtn = document.getElementById('playBtn');
            const progress = document.getElementById('audioProgress');
            const time = document.getElementById('audioTime');
            const bars = document.querySelectorAll('.wave-bar');

            playBtn.onclick = () => {
                if(audio.paused) {
                    audio.play();
                    playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                } else {
                    audio.pause();
                    playBtn.innerHTML = '<i class="fa-solid fa-play ml-1"></i>';
                }
            };

            audio.ontimeupdate = () => {
                const pct = (audio.currentTime / audio.duration) * 100;
                progress.style.width = `${pct}%`;
                const m = Math.floor(audio.currentTime / 60);
                const s = Math.floor(audio.currentTime % 60);
                time.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                
                // Reactive Animation
                bars.forEach(bar => {
                    const h = Math.random() * 30 + 5;
                    bar.style.height = audio.paused ? '4px' : `${h}px`;
                    bar.style.background = audio.paused ? '#1f1f2e' : 'var(--ff-cyan)';
                });
            };
            audio.onended = () => {
                playBtn.innerHTML = '<i class="fa-solid fa-play ml-1"></i>';
                bars.forEach(b => b.style.height = '4px');
            };
        }

        el.zipActionBtn.onclick = () => document.getElementById('zipModal').style.display = 'flex';
        function closeZipModal() { document.getElementById('zipModal').style.display = 'none'; }
        
        function downloadZip(mode) {
            let url = `/api/extract?download_type=zip&mode=${mode}`;
            if(mode === 'filtered') {
                url += `&filters=${Array.from(activeFilters).join(',')}`;
            }
            window.location.href = url;
            closeZipModal();
        }

        window.onclick = e => {
            if(!e.target.closest('.custom-dropdown')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none');
            }
        };
    </script>
</body>
</html>
