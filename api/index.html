<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets Extractor</title>
    <!-- Meta tags for link preview -->
    <meta name="description" content="AssetBundle, KTX & ASTC Extractor by MACBRUH_FF. High-performance Unity asset extraction for Free Fire and more.">
    <meta property="og:title" content="Assets Extractor">
    <meta property="og:description" content="Extract 3D Meshes, Textures, and Audio from Unity AssetBundles easily.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'GFF-Bold'; src: url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff'); }
        :root { --ff-yellow: #ffde00; --ff-cyan: #38bdf8; }
        body { 
            background: #000 url('https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/bg_pc.617c669.jpg') fixed center/cover;
            font-family: 'Inter', sans-serif; color: #fff;
        }
        body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: -1; }
        .gff { font-family: 'GFF-Bold', sans-serif; }
        
        /* Layout Requirement: Left Square, Right Rounded */
        .panel-container { 
            background: #0a0a0a; 
            border: 1px solid #1f1f1f;
            border-left: 4px solid var(--ff-yellow);
            border-radius: 0 24px 24px 0; /* Left Square, Right Rounded */
            height: 420px;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        
        .scroll-box { flex: 1; background: #060608; border: 1px solid #1a1a1f; border-radius: 12px; overflow-y: auto; position: relative; }
        
        /* Multi-select Dropdown */
        .custom-dropdown {
            position: absolute; top: 100%; right: 0; width: 180px;
            background: #121216; border: 1px solid #2a2a32;
            border-radius: 12px; z-index: 50; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dropdown-item { padding: 8px 12px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .dropdown-item:hover { background: #1a1a22; }
        .dropdown-item.active { color: var(--ff-yellow); }

        /* Audio Waveform */
        .wave-bar { width: 3px; height: 4px; background: #1f1f2e; border-radius: 2px; transition: height 0.1s ease; }
        .playing .wave-bar { animation: waveAnim 0.5s ease infinite alternate; }
        @keyframes waveAnim { from { height: 4px; } to { height: 24px; } }

        .btn-mechanical {
            background: var(--ff-yellow); color: #000; font-family: 'GFF-Bold';
            font-style: italic; text-transform: uppercase; border-radius: 12px;
            transition: all 0.1s; box-shadow: 0 4px 0 #c2a900;
        }
        .btn-mechanical:active { transform: translateY(2px); box-shadow: 0 2px 0 #c2a900; }
        
        .loading-overlay { background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 20; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex items-center mb-6">
            <img src="https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png" class="h-6" alt="FF">
        </div>

        <div class="text-center mb-10">
            <h1 class="gff text-5xl md:text-6xl italic font-black leading-none uppercase">Assets <span class="text-[#ffde00]">Extractor</span></h1>
            <p class="text-zinc-500 text-xs mt-2 tracking-widest flex items-center justify-center gap-2">
                <i class="fa-solid fa-cube"></i> AssetBundle • KTX • ASTC • Assets Extractor <i class="fa-solid fa-cube"></i>
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Upload -->
            <div class="panel-container">
                <div class="p-6 flex-1 flex flex-col justify-between">
                    <div>
                        <h2 class="gff text-xs uppercase tracking-wider">Upload Bundle</h2>
                        <p class="text-[10px] text-zinc-500">Supported: .unity3d, .bundle, .ktx, .astc</p>
                    </div>
                    
                    <div id="dropZone" onclick="document.getElementById('fileInput').click()" 
                         class="border-2 border-dashed border-zinc-800 rounded-2xl h-32 flex flex-col items-center justify-center cursor-pointer hover:bg-zinc-900/50 transition-all">
                        <i class="fa-solid fa-cloud-arrow-up text-2xl text-zinc-600 mb-2"></i>
                        <span id="fileNameDisplay" class="text-[11px] text-zinc-400 gff uppercase">Select File</span>
                        <input type="file" id="fileInput" class="hidden">
                    </div>

                    <button id="extractBtn" class="btn-mechanical w-full h-12 text-sm">Extract Assets</button>
                    
                    <div class="flex items-center gap-3 bg-zinc-900/50 p-3 rounded-xl border border-zinc-800">
                        <i class="fa-solid fa-terminal text-xs text-zinc-500"></i>
                        <span id="logText" class="text-[10px] text-zinc-400 truncate">System Ready.</span>
                    </div>
                </div>
            </div>

            <!-- List -->
            <div class="panel-container" id="listPanel">
                <div class="p-4 border-b border-zinc-800 flex justify-between items-center relative">
                    <div>
                        <h2 class="gff text-xs uppercase">Extracted List</h2>
                        <p id="fileCount" class="text-[10px] text-zinc-500">0 items</p>
                    </div>
                    <div class="flex gap-2">
                        <button id="filterToggle" class="hidden h-8 w-8 bg-zinc-900 border border-zinc-800 rounded-lg text-zinc-400"><i class="fa-solid fa-filter text-[10px]"></i></button>
                        <button id="zipBtn" class="hidden h-8 w-8 bg-zinc-900 border border-zinc-800 rounded-lg text-[#ffde00]"><i class="fa-solid fa-file-zipper text-[10px]"></i></button>
                        <div id="filterMenu" class="custom-dropdown"></div>
                    </div>
                </div>
                <div class="scroll-box m-4" id="listBody">
                    <div class="absolute inset-0 flex items-center justify-center flex-col text-zinc-700" id="listEmpty">
                        <i class="fa-solid fa-folder-open text-2xl mb-2"></i>
                        <span class="text-[9px] uppercase gff tracking-widest">No assets loaded</span>
                    </div>
                    <div id="fileList" class="p-2 space-y-1 hidden"></div>
                </div>
            </div>

            <!-- Preview -->
            <div class="panel-container">
                <div class="p-4 border-b border-zinc-800">
                    <h2 class="gff text-xs uppercase">File Preview</h2>
                </div>
                <div class="scroll-box m-4 flex items-center justify-center bg-black/40 relative" id="previewArea">
                    <div class="text-zinc-700 text-center" id="previewPlaceholder">
                        <i class="fa-solid fa-eye text-2xl mb-2"></i>
                        <p class="text-[9px] uppercase gff">Select to view</p>
                    </div>
                    <div id="previewLoading" class="loading-overlay absolute inset-0">
                        <i class="fa-solid fa-circle-notch fa-spin text-var(--ff-yellow)"></i>
                    </div>
                </div>
                <div id="previewFooter" class="p-4 hidden flex items-center justify-between gap-3">
                    <span id="previewName" class="text-[10px] text-zinc-400 font-bold truncate"></span>
                    <a id="downloadSingle" href="#" class="h-8 w-8 bg-zinc-800 rounded-lg flex items-center justify-center hover:bg-[#ffde00] hover:text-black transition-all">
                        <i class="fa-solid fa-arrow-down text-xs"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals/Overlays -->
    <div id="zipModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-[100] p-4">
        <div class="bg-[#0a0a0c] border border-zinc-800 rounded-2xl w-full max-w-xs overflow-hidden">
            <div class="p-4 border-b border-zinc-800 gff text-[11px] uppercase text-zinc-400">Download ZIP</div>
            <button onclick="downloadZip('normal')" class="w-full p-4 text-left text-xs hover:bg-zinc-900 border-b border-zinc-800 flex justify-between items-center">
                Download Normally <i class="fa-solid fa-list"></i>
            </button>
            <button onclick="downloadZip('grouped')" class="w-full p-4 text-left text-xs hover:bg-zinc-900 border-b border-zinc-800 flex justify-between items-center text-[#ffde00]">
                Download Grouped Assets <i class="fa-solid fa-folder-tree"></i>
            </button>
            <button onclick="document.getElementById('zipModal').style.display='none'" class="w-full p-3 text-center text-[10px] text-zinc-500 hover:text-white uppercase gff">Cancel</button>
        </div>
    </div>

    <script>
        let allAssets = [];
        let selectedFilters = new Set();

        const fileInput = document.getElementById('fileInput');
        const extractBtn = document.getElementById('extractBtn');
        const listBody = document.getElementById('listBody');
        const fileList = document.getElementById('fileList');
        const filterMenu = document.getElementById('filterMenu');

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if(file) document.getElementById('fileNameDisplay').innerText = file.name;
        };

        extractBtn.onclick = async () => {
            if(!fileInput.files[0]) return;
            
            extractBtn.disabled = true;
            extractBtn.innerText = "Extracting...";
            
            const formData = new FormData();
            formData.append('asset_bundle', fileInput.files[0]);

            try {
                const res = await fetch('/api/extract', { method: 'POST', body: formData });
                const data = await res.json();
                
                allAssets = data.files;
                renderList();
                renderFilters();
                
                document.getElementById('listEmpty').style.display = 'none';
                fileList.classList.remove('hidden');
                document.getElementById('filterToggle').classList.remove('hidden');
                document.getElementById('zipBtn').classList.remove('hidden');
                
                // Adaptive height for small lists
                if(allAssets.length < 5) document.getElementById('listPanel').style.height = "auto";
                else document.getElementById('listPanel').style.height = "420px";

            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                extractBtn.disabled = false;
                extractBtn.innerText = "Extract Assets";
            }
        };

        function renderList() {
            fileList.innerHTML = '';
            const filtered = allAssets.filter(a => selectedFilters.size === 0 || selectedFilters.has(a.label));
            
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = "p-3 bg-zinc-900/50 rounded-xl border border-zinc-800 flex items-center justify-between cursor-pointer hover:border-zinc-500 transition-all group";
                div.onclick = () => selectFile(item);
                div.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <i class="fa-solid ${getIcon(item.label)} text-[10px] text-zinc-500"></i>
                        <div class="overflow-hidden">
                            <p class="text-[11px] font-bold truncate group-hover:text-[#ffde00]">${item.name}</p>
                            <p class="text-[8px] text-zinc-600 uppercase font-black">${item.label}</p>
                        </div>
                    </div>
                `;
                fileList.appendChild(div);
            });
            document.getElementById('fileCount').innerText = `${filtered.length} items`;
        }

        function getIcon(label) {
            if(label.includes('Texture') || label === 'Sprite') return 'fa-image';
            if(label.includes('Audio')) return 'fa-volume-high';
            if(label.includes('Mesh')) return 'fa-cube';
            if(label === 'Font') return 'fa-font';
            return 'fa-file-code';
        }

        function renderFilters() {
            const types = [...new Set(allAssets.map(a => a.label))];
            filterMenu.innerHTML = '';
            types.forEach(t => {
                const item = document.createElement('div');
                item.className = "dropdown-item";
                item.innerHTML = `<i class="fa-regular ${selectedFilters.has(t) ? 'fa-square-check' : 'fa-square'}"></i> ${t}`;
                item.onclick = (e) => {
                    e.stopPropagation();
                    if(selectedFilters.has(t)) selectedFilters.delete(t);
                    else selectedFilters.add(t);
                    renderFilters();
                    renderList();
                };
                filterMenu.appendChild(item);
            });
        }

        document.getElementById('filterToggle').onclick = (e) => {
            e.stopPropagation();
            filterMenu.style.display = filterMenu.style.display === 'block' ? 'none' : 'block';
        };

        window.onclick = () => filterMenu.style.display = 'none';

        async function selectFile(item) {
            const loader = document.getElementById('previewLoading');
            const area = document.getElementById('previewArea');
            loader.style.display = 'flex';
            
            const url = `/api/extract?download_type=single&file_index=${item.index}`;
            document.getElementById('previewPlaceholder').style.display = 'none';
            document.getElementById('previewFooter').classList.remove('hidden');
            document.getElementById('previewName').innerText = item.name;
            document.getElementById('downloadSingle').href = url;

            area.innerHTML = '';
            area.appendChild(loader);

            const ext = item.name.split('.').pop().toLowerCase();
            
            if(['png','jpg','webp'].includes(ext)) {
                area.innerHTML += `<img src="${url}" class="max-h-full max-w-full object-contain">`;
            } else if(['mp3','wav','ogg'].includes(ext)) {
                area.innerHTML += `
                    <div class="w-full px-6 flex flex-col gap-4 items-center" id="audioPlayer">
                        <div class="flex gap-1 h-8 items-center">
                            ${Array(20).fill('<div class="wave-bar"></div>').join('')}
                        </div>
                        <button id="playBtn" class="h-10 w-10 rounded-full bg-[#ffde00] text-black flex items-center justify-center"><i class="fa-solid fa-play ml-1"></i></button>
                        <audio id="audioNode" src="${url}"></audio>
                    </div>
                `;
                const audio = document.getElementById('audioNode');
                const btn = document.getElementById('playBtn');
                btn.onclick = () => {
                    if(audio.paused) {
                        audio.play();
                        btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                        document.getElementById('audioPlayer').classList.add('playing');
                    } else {
                        audio.pause();
                        btn.innerHTML = '<i class="fa-solid fa-play ml-1"></i>';
                        document.getElementById('audioPlayer').classList.remove('playing');
                    }
                };
            } else {
                area.innerHTML += `<div class="text-[10px] font-mono text-zinc-500 p-4 overflow-auto h-full w-full">${item.label} Data Container</div>`;
            }
            
            loader.style.display = 'none';
        }

        document.getElementById('zipBtn').onclick = () => {
            document.getElementById('zipModal').style.display = 'flex';
        };

        function downloadZip(mode) {
            const filters = [...selectedFilters].join(',');
            const grouped = mode === 'grouped' ? 'true' : 'false';
            window.location.href = `/api/extract?download_type=zip&grouped=${grouped}&filters=${filters}`;
            document.getElementById('zipModal').style.display = 'none';
        }
    </script>
</body>
</html>
